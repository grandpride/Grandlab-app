<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Grandlab · Staff Appointment</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--gold:#F5C518;--black:#080808;--line:#2a2a26;--muted:#8a8a80;
    --surface2:#1b1b18;--field:#1e1e1a;--ok:#2ec36b;--danger:#e0533d}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Barlow',-apple-system,system-ui,sans-serif;background:var(--black);color:#f3f3ee;font-size:16px;min-height:100vh}
  .wrap{max-width:480px;margin:0 auto;padding:0 0 calc(40px + env(safe-area-inset-bottom))}
  .head{background:var(--black);padding:calc(18px + env(safe-area-inset-top)) 20px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  .brand{font-weight:900;letter-spacing:1px;font-size:20px;display:flex;align-items:center;justify-content:space-between}
  .brand b{color:var(--gold)}.brand small{font-size:11px;color:var(--muted);letter-spacing:2px;font-weight:700}
  .body{padding:18px 16px}
  .field{margin-bottom:14px}
  label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:6px}
  input,select{width:100%;background:var(--field);border:1px solid var(--line);border-radius:12px;color:#fff;padding:13px 14px;font-size:16px;font-family:inherit;appearance:none}
  input:focus,select:focus{outline:none;border-color:var(--gold)}
  select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23F5C518' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:40px}
  .row{display:flex;gap:10px}.row .field{flex:1}
  .balwrap{max-height:0;overflow:hidden;transition:.25s;opacity:0}
  .pkg-chips{margin-bottom:16px}
  .pkg-chip{display:flex;align-items:center;gap:10px;background:#1a2e1a;border:1px solid #2e7d32;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.15s}
  .pkg-chip:active{transform:scale(.98)}
  .pkg-chip.sel{border-color:var(--gold);background:#2a2810}
  .pkg-chip .pc-name{flex:1;font-weight:700;font-size:14px}
  .pkg-chip .pc-left{font-size:13px;font-weight:800;color:var(--gold);white-space:nowrap}
  .pkg-chip .pc-tag{font-size:10px;color:#7CFC9A;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .balwrap.show{max-height:130px;opacity:1;margin-bottom:14px}
  .lookup{font-size:13px;font-weight:700;padding:8px 12px;border-radius:10px;margin:-6px 0 14px;display:none}
  .lookup.found{display:block;background:#15351f;color:var(--ok);border:1px solid #1d5430}
  .lookup.newc{display:block;background:#3a3410;color:var(--gold);border:1px solid #5a5018}
  .slots{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
  .slot{background:var(--field);border:1.5px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center}
  .slot.sel{background:var(--gold);border-color:var(--gold);color:var(--black)}
  .slot.full{opacity:.35}
  .slot .t{font-size:14px;font-weight:800}.slot .l{font-size:10px;color:var(--muted);margin-top:2px}
  .slot.sel .l{color:#080808}.slot.full .l{color:var(--danger)}
  .preview{background:var(--surface2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:6px;white-space:pre-wrap;line-height:1.5;font-size:15px;color:#eaeae4;min-height:60px}
  .preview .ph{color:var(--muted)}
  .plabel{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);font-weight:800;margin:22px 4px 8px;display:flex;align-items:center;gap:8px}
  .plabel::after{content:"";flex:1;height:1px;background:var(--line)}
  .actions{display:flex;flex-direction:column;gap:10px;margin-top:18px}
  .btn{border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-primary{background:var(--gold);color:var(--black)}.btn-wa{background:#25D366;color:#fff}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:#ccc}.btn:active{transform:scale(.98)}
  .hidden{display:none!important}
  .toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:var(--ok);color:#fff;padding:12px 22px;border-radius:30px;font-weight:700;opacity:0;transition:.3s;pointer-events:none;z-index:30;max-width:90%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.err{background:var(--danger)}
  .banner{background:#3a3410;border:1px solid var(--gold);color:var(--gold);border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.5;margin-bottom:16px}
.picker-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:none;align-items:flex-end;justify-content:center}
.picker-ov.show{display:flex}
.picker{background:var(--surface2);width:100%;max-width:560px;max-height:80dvh;border-radius:16px 16px 0 0;display:flex;flex-direction:column;overflow:hidden}
.picker-head{padding:12px 14px;border-bottom:1px solid var(--line)}
.picker-head input{width:100%;background:var(--field);border:1px solid var(--line);border-radius:10px;color:#f3f3ee;padding:11px 12px;font-size:15px;font-family:inherit;outline:none}
.picker-head input:focus{border-color:var(--gold)}
.picker-list{overflow-y:auto;flex:1;padding:6px 0}
.picker-cat{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;padding:8px 14px 4px;position:sticky;top:0;background:var(--surface2)}
.picker-item{padding:12px 14px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--line);color:#f3f3ee}
.picker-item:active{background:var(--field)}
.picker-empty{padding:20px;text-align:center;color:var(--muted);font-size:13px}
.picker-close{padding:12px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer;border-top:1px solid var(--line)}
</style>
</head>
<body>
<a href="https://grandpride.github.io/Grandlab-app/gl-hub.html" style="position:fixed;top:8px;left:8px;z-index:300;background:rgba(0,0,0,.65);color:#F5C518;text-decoration:none;font-size:12px;font-weight:700;padding:6px 11px;border-radius:20px;font-family:-apple-system,sans-serif;backdrop-filter:blur(4px)">← Hub</a>
<div id="keyGate" class="hidden" style="position:fixed;inset:0;background:#080808;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="max-width:380px;width:100%">
    <div style="font-weight:900;font-size:22px;letter-spacing:1px;margin-bottom:6px">GRAND<span style="color:#F5C518">LAB</span></div>
    <div style="color:#8a8a80;font-size:13px;margin-bottom:18px">Staff Booking — sign in to continue.</div>
    <input id="loginEmail" type="email" autocomplete="username" placeholder="admin@grandpride.com" style="width:100%;background:#1e1e1a;border:1px solid #2a2a26;border-radius:12px;color:#fff;padding:13px 14px;font-size:15px;font-family:inherit;margin-bottom:10px">
    <input id="keyInput" type="password" autocomplete="current-password" placeholder="Password" style="width:100%;background:#1e1e1a;border:1px solid #2a2a26;border-radius:12px;color:#fff;padding:13px 14px;font-size:15px;font-family:inherit">
    <div id="keyErr" style="color:#e0533d;font-size:12px;margin-top:8px;min-height:16px"></div>
    <button onclick="submitKey()" style="width:100%;margin-top:10px;background:#F5C518;color:#080808;border:none;border-radius:12px;padding:14px;font-weight:800;font-size:15px;font-family:inherit">Sign in</button>
  </div>
</div>
<div class="wrap">
  <div class="head">
    <div class="brand"><span>GRAND<b>LAB</b></span><small>STAFF BOOKING</small></div>
  </div>

  <div class="body">
    <div class="banner hidden" id="noKeys">⚠️ Supabase not connected. Messages still build, but lookup, slots & saving need your keys (top of code file).</div>

    <div class="field"><label>Contact No (type to find customer)</label>
      <input id="contact" type="tel" inputmode="numeric" placeholder="e.g. 60103595591"></div>
    <div class="lookup" id="lookup"></div>
    <div class="field"><label>Full Name</label><input id="name" placeholder="e.g. AMIERUL"></div>

    <div class="field"><label>Car (pick or add new)</label>
      <select id="carSelect"><option value="__new__">+ Add new car</option></select></div>
    <div class="row" id="carEntry">
      <div class="field"><label>Brand</label>
        <select id="bkBrand" onchange="bkBrandChange()"><option value="">— select brand —</option></select></div>
      <div class="field"><label>Model</label>
        <select id="bkModelSel" onchange="bkModelChange()" style="display:none"><option value="">— select model —</option></select>
        <input id="car" placeholder="e.g. HONDA ACCORD"></div>
    </div>
    <div class="row">
      <div class="field"><label>Car Type</label>
        <select id="bkType"><option value="">—</option></select></div>
      <div class="field"><label>Number Plate</label><input id="plate" placeholder="e.g. CEJ22"></div>
    </div>

    <div id="pkgChips" class="pkg-chips hidden">
      <label style="margin-bottom:8px">🎟️ Active packages for this car — tap to use</label>
      <div id="pkgChipsList"></div>
    </div>

    <div class="field"><label>Service Type</label>
      <div style="display:flex;gap:8px">
        <select id="svc" style="flex:1"><option value="">— Loading… —</option></select>
        <button type="button" id="svcBrowseBtn" onclick="openSvcPicker()" style="flex:0 0 auto;background:#1e1e1a;border:1px solid var(--border);border-radius:10px;color:var(--gold);padding:0 14px;cursor:pointer;font-size:13px;font-weight:600">Search</button>
      </div>
    </div>

    <div class="field"><label>Date</label><input id="date" type="date"></div>

    <label>Time Slot <span style="text-transform:none;color:var(--muted);font-weight:400">(live availability)</span></label>
    <div class="slots" id="slots"><div style="grid-column:1/-1;color:var(--muted);font-size:13px">Pick a date to see slots…</div></div>
    <div class="field"><label>Or custom time</label><input id="time" placeholder="e.g. 1030am"></div>

    <div class="balwrap" id="balwrap"><label>Coating Maintenance Balance <span id="balHint" style="text-transform:none;color:var(--muted);font-weight:400"></span></label>
      <input id="bal" type="number" inputmode="numeric" placeholder="e.g. 5"></div>

    <div class="row">
      <div class="field"><label>Deposit (RM) <span style="text-transform:none;color:var(--muted);font-weight:400">optional</span></label>
        <input id="deposit" type="number" inputmode="decimal" placeholder="e.g. 50"></div>
      <div class="field"><label>Deposit Date</label>
        <input id="depDate" type="date"></div>
    </div>

    <div class="plabel">WhatsApp Preview</div>
    <div class="preview" id="preview"><span class="ph">Fill the form to see the message…</span></div>

    <div class="actions">
      <button class="btn btn-wa" id="send">📋 Copy + Open WhatsApp</button>
      <button class="btn btn-primary" id="save">💾 Save booking</button>
      <button class="btn btn-ghost" id="clear">Clear form</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Done</div>

<!-- Searchable service picker -->
<div class="picker-ov" id="svcPickerOv">
  <div class="picker">
    <div class="picker-head"><input id="svcPickerSearch" placeholder="Search service…" oninput="renderSvcPicker()" autocomplete="off"></div>
    <div class="picker-list" id="svcPickerList"></div>
    <div class="picker-close" onclick="closeSvcPicker()">Cancel</div>
  </div>
</div>

<script>
/* ============================================================
   GRANDLAB STAFF BOOKING — uses the public anon key (safe to bake in)
   + reception login. No service_role key, no key pasting.
   ============================================================ */
const SUPABASE_URL  = "https://eychljpzorzmaveixlnu.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5Y2hsanB6b3J6bWF2ZWl4bG51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDk2NjQsImV4cCI6MjA5NzIyNTY2NH0.6dA1zhz5ZIwf8byFB8vhfOzPI-uPPdPihEr1b8GG_oA";
/* ---- live slot config (match your app's BOOKING_CFG) ---- */
const SLOT_TIMES = ["9:00 AM","10:00 AM","11:00 AM","1:30 PM","3:00 PM"];
const SLOTS_PER_TIME = 2;
/* ============================================================ */

const $=id=>document.getElementById(id);
let sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON,{auth:{persistSession:true,autoRefreshToken:true,storageKey:'gl_auth'}});
let SERVICES=[], foundProfile=null, profileCars=[], selectedSlot=null, takenCounts={};
let selectedServiceObj=null;
let connected = false;

// show the login gate or boot the app (reception login, like the job card)
async function boot(){
  const {data}=await sb.auth.getSession();
  if(data && data.session){
    document.getElementById('keyGate')?.classList.add('hidden');
    document.getElementById('noKeys')?.classList.add('hidden');
    connected=true;
    loadServices();
  }else{
    document.getElementById('keyGate')?.classList.remove('hidden');
  }
}
async function submitKey(){
  const email=(document.getElementById('loginEmail')?.value||'').trim();
  const pass=document.getElementById('keyInput').value;
  document.getElementById('keyErr').textContent='Signing in…';
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){ document.getElementById('keyErr').textContent='Login failed: '+error.message; return; }
  document.getElementById('keyErr').textContent='';
  document.getElementById('keyGate').classList.add('hidden');
  connected=true; loadServices(); bkLoadBrands();
}

/* ---------- car brand/model/type picker (same as plate scanner) ---------- */
let BK_BRANDS=[], BK_MODELS={}, BK_TYPES=[], BK_PENDING_TYPE=null;
async function bkLoadBrands(){
  if(!connected) return;
  const {data}=await sb.from('gl_car_brands').select('id,name,active,sort_order').eq('active',true).order('sort_order',{ascending:true});
  BK_BRANDS=data||[];
  const sel=$('bkBrand');
  if(sel) sel.innerHTML='<option value="">— select brand —</option>'+BK_BRANDS.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')+'<option value="__other">Other / not listed</option>';
  bkLoadTypes();
}
async function bkLoadTypes(){
  if(BK_TYPES.length){ bkFillType(); return; }
  const {data}=await sb.from('gl_car_models').select('type').eq('active',true);
  const set=new Set((data||[]).map(r=>(r.type||'').trim()).filter(Boolean));
  BK_TYPES=[...set].sort();
  bkFillType();
}
function bkFillType(){
  const sel=$('bkType'); if(!sel) return;
  const cur=BK_PENDING_TYPE!=null?BK_PENDING_TYPE:sel.value;
  if(BK_TYPES.length){ sel.innerHTML='<option value="">—</option>'+BK_TYPES.map(t=>`<option>${esc(t)}</option>`).join(''); }
  if(cur){
    if(![...sel.options].some(o=>o.value===cur||o.textContent===cur)){ const o=document.createElement('option'); o.value=cur;o.textContent=cur; sel.appendChild(o); }
    sel.value=cur;
  }
  BK_PENDING_TYPE=null;
}
async function bkBrandChange(){
  const bid=$('bkBrand').value;
  const modelSel=$('bkModelSel'), modelInput=$('car');
  if(!bid||bid==='__other'){ modelSel.style.display='none'; modelInput.style.display='block'; modelInput.value=''; return; }
  modelSel.style.display='block'; modelInput.style.display='none';
  modelSel.innerHTML='<option>Loading…</option>';
  let models=BK_MODELS[bid];
  if(!models){
    const {data}=await sb.from('gl_car_models').select('name,type').eq('brand_id',bid).eq('active',true).order('sort_order',{ascending:true});
    models=data||[]; BK_MODELS[bid]=models;
  }
  const brandName=(BK_BRANDS.find(b=>String(b.id)===String(bid))||{}).name||'';
  modelSel.innerHTML='<option value="">— select model —</option>'+
    models.map(m=>`<option value="${esc(m.name)}" data-type="${esc(m.type||'')}">${esc(m.name)}</option>`).join('')+
    '<option value="__other">Other / not listed</option>';
  modelSel.dataset.brand=brandName;
}
function bkModelChange(){
  const sel=$('bkModelSel'), modelInput=$('car');
  const val=sel.value;
  if(val==='__other'){ sel.style.display='none'; modelInput.style.display='block'; modelInput.value=''; modelInput.focus(); return; }
  if(!val){ modelInput.value=''; return; }
  const brand=sel.dataset.brand||'';
  modelInput.value=(brand?brand+' ':'')+val;
  const opt=sel.options[sel.selectedIndex];
  bkSetType(opt?opt.getAttribute('data-type'):'');
}
function bkSetType(t){
  const sel=$('bkType'); if(!sel) return;
  t=(t||'').trim(); if(!t) return;
  if(!BK_TYPES.length){ BK_PENDING_TYPE=t; }
  if(![...sel.options].some(o=>o.value===t||o.textContent===t)){ const o=document.createElement('option'); o.value=t;o.textContent=t; sel.appendChild(o); }
  sel.value=t;
}

const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const normPhone=p=>(p||'').replace(/[^0-9]/g,'');
function toast(t,err){const e=$('toast');e.textContent=t;e.className='toast show'+(err?' err':'');setTimeout(()=>e.className='toast',1900);}

/* ---------- services from gl_services (with is_coating flag) ---------- */
async function loadServices(){
  if(!connected){ SERVICES=[{id:null,name:'(connect Supabase to load services)',is_coating:false}]; renderDropdown(); return; }
  const {data,error}=await sb.from('gl_services').select('id,name,is_coating,category,sort_order,active').eq('active',true).order('sort_order');
  if(error){toast('Services load fail: '+error.message,true);return;}
  SERVICES=data||[]; renderDropdown();
}
function renderDropdown(){
  // group by category if present, else flat
  const cats={};
  SERVICES.forEach(s=>{ const c=s.category||'Services'; (cats[c]=cats[c]||[]).push(s); });
  let h='<option value="">— Select service —</option>';
  Object.keys(cats).forEach(c=>{
    h+=`<optgroup label="${esc(c)}">`+cats[c].map(s=>`<option value="${s.id||''}" data-coat="${s.is_coating?1:0}" data-name="${esc(s.name)}">${esc(s.name)}</option>`).join('')+'</optgroup>';
  });
  $('svc').innerHTML=h; build();
}

/* ---------- searchable service picker (same style as job card) ---------- */
function openSvcPicker(){ $('svcPickerSearch').value=''; renderSvcPicker(); $('svcPickerOv').classList.add('show'); setTimeout(()=>$('svcPickerSearch').focus(),50); }
function closeSvcPicker(){ $('svcPickerOv').classList.remove('show'); }
function renderSvcPicker(){
  const q=($('svcPickerSearch').value||'').toLowerCase().trim();
  const list=SERVICES.filter(s=>s.id && (!q || (s.name||'').toLowerCase().includes(q) || (s.category||'').toLowerCase().includes(q)));
  if(!list.length){ $('svcPickerList').innerHTML='<div class="picker-empty">No matching service.</div>'; return; }
  const groups={}, order=[];
  list.forEach(s=>{ const c=s.category||'Services'; if(!groups[c]){groups[c]=[];order.push(c);} groups[c].push(s); });
  window._pickMap=list;
  $('svcPickerList').innerHTML=order.map(c=>`
    <div class="picker-cat">${esc(c)}</div>
    ${groups[c].map(s=>{ const idx=list.indexOf(s); return `<div class="picker-item" onclick="pickSvc(${idx})">${esc(s.name)}</div>`;}).join('')}
  `).join('');
}
function pickSvc(idx){
  const s=(window._pickMap||[])[idx]; if(!s) return;
  // set the native select to this service + fire its change handler
  $('svc').value=s.id||'';
  $('svc').dispatchEvent(new Event('change'));
  closeSvcPicker();
}
$('svc').addEventListener('change',()=>{
  const o=$('svc').options[$('svc').selectedIndex];
  selectedServiceObj = o ? {id:o.value, name:o.dataset.name, is_coating:o.dataset.coat==='1'} : null;
  build();
  // when a coating service is picked, (re)pull the balance for the current plate
  if(selectedServiceObj && selectedServiceObj.is_coating){
    const plate=($('plate').value||'').trim().toUpperCase();
    if(plate) autoBalance(plate);
  }
});

/* ---------- live slots from gl_bookings ---------- */
$('date').addEventListener('change',loadSlots);
async function loadSlots(){
  selectedSlot=null;takenCounts={};
  const d=$('date').value;
  if(!d){ $('slots').innerHTML='<div style="grid-column:1/-1;color:var(--muted);font-size:13px">Pick a date to see slots…</div>'; return; }
  if(connected){
    // bookings scheduled on that date — count by time portion
    const start=d+"T00:00:00", end=d+"T23:59:59";
    const {data}=await sb.from('gl_bookings').select('scheduled_at,notes').gte('scheduled_at',start).lte('scheduled_at',end);
    (data||[]).forEach(r=>{
      // we store the chosen slot label in notes as [slot:HH] — fallback to time parse
      let t=null;
      const m=(r.notes||'').match(/\[slot:([^\]]+)\]/); if(m) t=m[1];
      if(t) takenCounts[t]=(takenCounts[t]||0)+1;
    });
  }
  renderSlots();
}
function renderSlots(){
  $('slots').innerHTML=SLOT_TIMES.map(t=>{
    const used=takenCounts[t]||0, left=SLOTS_PER_TIME-used, full=left<=0;
    return `<div class="slot ${full?'full':''} ${selectedSlot===t?'sel':''}" data-t="${t}">
      <div class="t">${t}</div><div class="l">${full?'Full':left+' left'}</div></div>`;
  }).join('');
  document.querySelectorAll('#slots .slot:not(.full)').forEach(s=>s.onclick=()=>{
    selectedSlot=s.dataset.t; $('time').value=s.dataset.t; renderSlots(); build();
  });
}

/* ---------- customer lookup in gl_profiles ---------- */
let lt=null;
$('contact').addEventListener('input',()=>{clearTimeout(lt);lt=setTimeout(doLookup,500);});
async function doLookup(){
  foundProfile=null;profileCars=[];
  const phone=normPhone($('contact').value);
  $('carSelect').innerHTML='<option value="__new__">+ Add new car</option>';
  if(phone.length<7||!connected){$('lookup').className='lookup';return;}
  // gl_profiles stores phone WITH a + prefix (e.g. +60169618299); the input is
  // digits only. Match both "+<digits>" and "<digits>".
  const {data}=await sb.from('gl_profiles')
    .select('id,name,phone, gl_vehicles(id,make,model,plate,car_type)')
    .or(`phone.eq.+${phone},phone.eq.${phone}`)
    .limit(1).maybeSingle();
  if(data){
    foundProfile=data; profileCars=data.gl_vehicles||[];
    $('name').value=data.name||'';
    $('lookup').className='lookup found';
    $('lookup').textContent=`✓ Existing: ${data.name||'(no name)'} · ${profileCars.length} car(s)`;
    $('carSelect').innerHTML=profileCars.map(c=>{
      const label=[c.make,c.model].filter(Boolean).join(' ')||'(car)';
      return `<option value="${c.id}">${esc(label)} · ${esc(c.plate||'')}</option>`;
    }).join('')+'<option value="__new__">+ Add new car</option>';
    onCarSelect();
  }else{
    // not in profiles — check gl_walkin
    const {data:wk}=await sb.from('gl_walkin').select('*').or(`phone.eq.+${phone},phone.eq.${phone}`).limit(1).maybeSingle();
    if(wk){ fillFromWalkin_(wk); }
    else { $('lookup').className='lookup newc'; $('lookup').textContent='🆕 New customer — saved with booking'; CAR_PACKAGES=[]; renderPkgChips(); }
  }
}

/* Fill the booking form from a gl_walkin record. */
function fillFromWalkin_(wk){
  foundProfile=null; profileCars=[];
  $('lookup').className='lookup found';
  $('lookup').textContent=`✓ ${wk.name||'(no name)'} (walk-in)`;
  if(wk.name) $('name').value=wk.name;
  if(wk.phone && !$('contact').value) $('contact').value=wk.phone.replace(/^\+/,'');
  if(wk.plate) $('plate').value=wk.plate;
  if(wk.model) $('car').value=wk.model;
  if(wk.car_type){ const t=$('bkType'); if(t){ const o=[...t.options].find(x=>x.value.toLowerCase()===String(wk.car_type).toLowerCase()); t.value=o?o.value:wk.car_type; } }
  CAR_PACKAGES=[]; renderPkgChips();
}
$('carSelect').addEventListener('change',onCarSelect);
async function onCarSelect(){
  const v=$('carSelect').value;
  if(v==='__new__'){$('carEntry').style.display='flex';$('car').value='';$('plate').value='';$('bal').value='';$('balHint').textContent='';}
  else{
    const c=profileCars.find(x=>x.id===v);
    $('carEntry').style.display='none';
    if(c){ $('car').value=[c.make,c.model].filter(Boolean).join(' ');$('plate').value=c.plate||'';
      if(c.car_type){ const t=$('bkType'); if(t){ const o=[...t.options].find(x=>x.value.toLowerCase()===String(c.car_type).toLowerCase()); t.value=o?o.value:c.car_type; } }
      await autoBalance(c.plate); }
  }
  build();
}
/* Load this car's active packages: render tappable chips at top + auto-fill balance.
   Packages link by owner_id + vehicle_label (= the PLATE). */
let CAR_PACKAGES=[];
async function autoBalance(plate){
  $('bal').value='';$('balHint').textContent='';
  CAR_PACKAGES=[];
  renderPkgChips();
  if(!connected || !plate) return;
  try{
    const owner=foundProfile?foundProfile.id:null;
    let q=sb.from('gl_packages')
      .select('id,total_uses,used_uses,service_name,status,vehicle_label,pkg_type,owner_id')
      .eq('status','active');
    if(plate && owner) q=q.or(`vehicle_label.ilike.${plate},owner_id.eq.${owner}`);
    else q=q.ilike('vehicle_label',plate);
    const {data}=await q;
    CAR_PACKAGES = (data||[]).map(p=>({...p, remaining:(p.total_uses||0)-(p.used_uses||0)}))
                              .filter(p=>p.remaining>0);
    renderPkgChips();
    // if the chosen service matches an active package on this car, fill its balance
    if(selectedServiceObj){
      const nm=(selectedServiceObj.name||'').toLowerCase().replace(/^\s*\d+\s*x?\s*(times?\s*)?/,'').trim();
      const match=CAR_PACKAGES.find(p=>(p.service_name||'').toLowerCase().replace(/^\s*\d+\s*x?\s*(times?\s*)?/,'').trim()===nm);
      if(match){ $('bal').value=match.remaining; $('balHint').textContent='(auto from package)'; }
      else if(selectedServiceObj.is_coating){
        const total=CAR_PACKAGES.reduce((s,p)=>s+p.remaining,0);
        if(total>0){ $('bal').value=total; $('balHint').textContent='(auto from package)'; }
        else $('balHint').textContent='(no package on file — type manually)';
      }
    }
  }catch(e){ $('balHint').textContent='(type manually)'; }
}
function renderPkgChips(){
  const wrap=$('pkgChips'), list=$('pkgChipsList');
  if(!CAR_PACKAGES.length){ wrap.classList.add('hidden'); list.innerHTML=''; return; }
  wrap.classList.remove('hidden');
  list.innerHTML=CAR_PACKAGES.map((p,i)=>`
    <div class="pkg-chip" data-i="${i}">
      <div>
        <div class="pc-name">${esc(p.service_name||'Package')}</div>
        <div class="pc-tag">tap to use this package</div>
      </div>
      <div style="flex:1"></div>
      <div class="pc-left">${p.remaining} left</div>
    </div>`).join('');
  list.querySelectorAll('.pkg-chip').forEach(ch=>ch.onclick=()=>usePackageChip(parseInt(ch.dataset.i)));
}
function usePackageChip(i){
  const p=CAR_PACKAGES[i]; if(!p) return;
  // select the matching service in the dropdown by name
  const opt=[...$('svc').options].find(o=>o.dataset.name===p.service_name || o.value===p.service_name || o.text===p.service_name);
  if(opt){
    $('svc').value=opt.value;
    selectedServiceObj={id:opt.value,name:opt.dataset.name||opt.text,is_coating:opt.dataset.coat==='1'};
  }else{
    // service not in catalog dropdown — still set the name + coating
    selectedServiceObj={id:null,name:p.service_name,is_coating:true};
  }
  // highlight chosen chip
  $('pkgChipsList').querySelectorAll('.pkg-chip').forEach((c,idx)=>c.classList.toggle('sel',idx===i));
  // fill balance with THIS package's remaining
  $('bal').value=p.remaining; $('balHint').textContent='(from selected package)';
  build();
}
/* type a plate -> find the customer by plate (fills name, phone, cars, balance) */
let _plateTimer=null;
$('plate').addEventListener('input',()=>{
  clearTimeout(_plateTimer);
  _plateTimer=setTimeout(async()=>{
    const plate=$('plate').value.trim().toUpperCase();
    if(plate.length<3) return;
    if(foundProfile && $('contact').value) { autoBalance(plate); return; } // already have customer
    if(!connected) return;
    const {data}=await sb.from('gl_vehicles')
      .select('id,make,model,plate,owner_id, gl_profiles(id,name,phone)')
      .ilike('plate',plate).limit(1).maybeSingle();
    if(data && data.gl_profiles){
      const prof=data.gl_profiles;
      foundProfile=prof;
      const {data:cars}=await sb.from('gl_vehicles').select('id,make,model,plate,car_type').eq('owner_id',prof.id);
      profileCars=cars||[];
      $('name').value=prof.name||'';
      if(prof.phone) $('contact').value=prof.phone.replace(/^\+/,'');
      $('lookup').className='lookup found';
      $('lookup').textContent=`✓ ${prof.name||'(no name)'} (by plate) · ${profileCars.length} car(s)`;
      $('carSelect').innerHTML=profileCars.map(c=>{
        const label=[c.make,c.model].filter(Boolean).join(' ')||'(car)';
        return `<option value="${c.id}"${c.plate===plate?' selected':''}>${esc(label)} · ${esc(c.plate||'')}</option>`;
      }).join('')+'<option value="__new__">+ Add new car</option>';
      if(data.model && !$('car').value) $('car').value=[data.make,data.model].filter(Boolean).join(' ');
      autoBalance(plate);
    }else{
      // not in profiles — check gl_walkin by plate
      const {data:wk}=await sb.from('gl_walkin').select('*').ilike('plate',plate).limit(1).maybeSingle();
      if(wk){ fillFromWalkin_(wk); }
      autoBalance(plate); // packages keyed by plate — always try
    }
  },500);
});

/* ---------- message ---------- */
function isCoating(){ return !!(selectedServiceObj&&selectedServiceObj.is_coating); }
function serviceName(){ return selectedServiceObj?selectedServiceObj.name:''; }
function fmtDate(v){if(!v)return"";const[y,m,d]=v.split("-");return `${+d}/${+m}/${y}`;}
function build(){
  // show the balance field if a coating service OR any active package is on this car
  const hasPkg=(typeof CAR_PACKAGES!=='undefined' && CAR_PACKAGES && CAR_PACKAGES.length>0);
  $('balwrap').classList.toggle('show', isCoating()||hasPkg);
  const s=serviceName(),date=fmtDate($('date').value),time=$('time').value.trim(),
    name=$('name').value.trim(),contact=$('contact').value.trim(),
    car=$('car').value.trim(),plate=$('plate').value.trim(),bal=$('bal').value.trim();
  if(!s&&!name&&!date){$('preview').innerHTML='<span class="ph">Fill the form to see the message…</span>';return"";}
  let m=`${s||"(service)"} ✅\nDate : ${date||"(date)"}\nTime : ${time||"(time)"}\n\n`;
  m+=`Full Name: ${name||"(name)"}\nContact no: ${contact||"(contact)"}\nCar model: ${car||"(car)"}\nNumber plate: ${plate||"(plate)"}\n`;
  if(bal)m+=`\nmaintenance / package balance : ${bal}\n`;
  const dep=parseFloat($('deposit').value);
  if(!isNaN(dep)&&dep>0){ m+=`\nDeposit paid : RM${dep}${$('depDate').value?(' on '+fmtDate($('depDate').value)):''}\n`; }
  $('preview').textContent=m;return m;
}
['change','input'].forEach(ev=>document.querySelectorAll('input').forEach(el=>el.addEventListener(ev,build)));

/* ---------- copy / save to gl_bookings ---------- */
async function copyMsg(){const m=build();if(!m.trim()){toast('Fill the form first',true);return null;}
  try{await navigator.clipboard.writeText(m);}catch(e){const t=document.createElement('textarea');t.value=m;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();}return m;}
$('send').onclick=async()=>{const m=await copyMsg();if(!m)return;
  const phone=normPhone($('contact').value);
  toast('Copied! Opening WhatsApp…');
  const url=phone
    ? 'https://web.whatsapp.com/send?phone='+phone+'&text='+encodeURIComponent(m)
    : 'https://web.whatsapp.com/';
  setTimeout(()=>window.open(url,'_blank'),400);
};
$('clear').onclick=()=>{document.querySelectorAll('input').forEach(i=>i.value="");$('svc').selectedIndex=0;selectedServiceObj=null;
  $('lookup').className='lookup';foundProfile=null;profileCars=[];selectedSlot=null;$('carEntry').style.display='flex';
  CAR_PACKAGES=[];renderPkgChips();
  $('slots').innerHTML='<div style="grid-column:1/-1;color:var(--muted);font-size:13px">Pick a date to see slots…</div>';build();};

$('save').onclick=async()=>{
  if(!connected)return toast('Connect Supabase first',true);
  if(!$('date').value)return toast('Date required',true);
  if(!serviceName())return toast('Select a service',true);
  const phone=normPhone($('contact').value);
  const timeLabel=$('time').value.trim();
  // build scheduled_at from date + selected slot (default 09:00 if custom text)
  const sched=$('date').value+"T"+slotToTime(timeLabel)+":00+08:00";
  try{
    // If existing app customer, link directly. Otherwise save to gl_walkin
    // (shop customers can't go in gl_profiles — that id is FK to auth.users).
    let custId = foundProfile ? foundProfile.id : null;
    let vehId  = (foundProfile && $('carSelect').value!=='__new__') ? $('carSelect').value : null;

    if(!custId){
      const nm=$('name').value.trim();
      const plate=($('plate').value||'').trim().toUpperCase();
      const carModel=$('car').value.trim();
      // check if they already registered in the app (profile by phone)
      const {data:exist}=await sb.from('gl_profiles')
        .select('id, gl_vehicles(id,plate)')
        .or(`phone.eq.+${phone},phone.eq.${phone}`).limit(1).maybeSingle();
      if(exist){
        custId=exist.id;
        const match=(exist.gl_vehicles||[]).find(v=>(v.plate||'').toUpperCase()===plate);
        vehId=match?match.id:null;
        if(plate && !vehId){
          const {data:nv}=await sb.from('gl_vehicles')
            .insert({owner_id:custId, plate:plate, model:carModel||null})
            .select('id').maybeSingle();
          if(nv) vehId=nv.id;
        }
      }else{
        // save as a walk-in record (claimed into a real profile when they register)
        // dedupe: match by plate first, else by normalized phone — update, don't duplicate
        let ex2=null;
        if(plate){
          const {data}=await sb.from('gl_walkin').select('id').ilike('plate',plate).limit(1).maybeSingle();
          ex2=data;
        }
        if(!ex2 && phone){
          const {data}=await sb.from('gl_walkin').select('id,phone').limit(1000);
          const hit=(data||[]).find(r=>String(r.phone||'').replace(/\D/g,'')===String(phone).replace(/\D/g,''));
          if(hit) ex2={id:hit.id};
        }
        const wkBody={ name:nm||null, phone:'+'+phone, plate:plate||null, model:carModel||null };
        if(ex2){ await sb.from('gl_walkin').update(wkBody).eq('id',ex2.id); }
        else { await sb.from('gl_walkin').insert(wkBody); }
        // bookings for walk-ins keep customer_id null (details are in notes)
      }
    }

    const booking={
      customer_id: custId,
      vehicle_id:  vehId,
      service_id:  selectedServiceObj?.id||null,
      service_name: serviceName(),
      scheduled_at: sched,
      status:'pending',
      source:'whatsapp',
      notes: buildNotes(phone,timeLabel)
    };
    // deposit at booking (optional) -> amount_paid + payment_type
    const dep=parseFloat($('deposit').value);
    if(!isNaN(dep) && dep>0){
      booking.amount_paid=dep;
    }
    const {error}=await sb.from('gl_bookings').insert(booking);
    if(error)throw error;
    toast('Booking saved ✓'); loadSlots();
  }catch(e){ toast('Save failed: '+(e.message||e),true); }
};
function slotToTime(label){
  // map "1:30 PM" -> "13:30" ; if not a known slot, default 09:00
  const map={"9:00 AM":"09:00","10:00 AM":"10:00","11:00 AM":"11:00","1:30 PM":"13:30","3:00 PM":"15:00"};
  return map[label]||"09:00";
}
function buildNotes(phone,timeLabel){
  // pack the human details Option A needs into notes (no separate customer row yet)
  const parts=[];
  parts.push(`Name: ${$('name').value.trim()}`);
  parts.push(`Phone: ${phone}`);
  parts.push(`Car: ${$('car').value.trim()}`);
  parts.push(`Plate: ${$('plate').value.trim()}`);
  if(isCoating()) parts.push(`CoatingBalance: ${$('bal').value.trim()}`);
  const dep=parseFloat($('deposit').value);
  if(!isNaN(dep)&&dep>0){ parts.push(`Deposit: ${dep}`); if($('depDate').value) parts.push(`DepDate: ${fmtDate($('depDate').value)}`); }
  if(timeLabel) parts.push(`[slot:${timeLabel}]`);
  return parts.join(' | ');
}

boot();

/* Auto-uppercase all text inputs as you type (skip email/password/number/phone) */
document.addEventListener('input',function(e){
  const el=e.target;
  if(el.tagName!=='INPUT') return;
  const t=(el.type||'text').toLowerCase();
  if(t==='email'||t==='password'||t==='number'||t==='tel'||el.inputMode==='numeric') return;
  if(el.id==='loginEmail'||el.id==='keyInput'||el.id==='contact'||el.id==='deposit') return;
  const s=el.selectionStart, en=el.selectionEnd, up=el.value.toUpperCase();
  if(el.value!==up){ el.value=up; try{el.setSelectionRange(s,en);}catch(_){} }
},true);
</script>
