/* ---------- Auto-slide carousel ---------- */
let _sliderTimers={};
function startSlider(trackId, interval){
  if(_sliderTimers[trackId]){ clearInterval(_sliderTimers[trackId]); delete _sliderTimers[trackId]; }
  // defer so the DOM has laid out and offsetLeft values are real
  setTimeout(()=>{
    const track=document.getElementById(trackId);
    if(!track) return;
    const cards=track.children;
    if(cards.length<2) return;
    let idx=0, paused=false;
    const go=()=>{
      if(paused) return;
      idx=(idx+1)%cards.length;
      const card=cards[idx];
      if(card) track.scrollTo({left:card.offsetLeft - track.offsetLeft, behavior:'smooth'});
    };
    _sliderTimers[trackId]=setInterval(go, interval||4000);
    // pause while user is interacting, resume after
    const pause=()=>{ paused=true; };
    const resume=()=>{ setTimeout(()=>{ paused=false; }, 3000); };
    track.addEventListener('touchstart',pause,{passive:true});
    track.addEventListener('touchend',resume,{passive:true});
    track.addEventListener('mousedown',pause);
    track.addEventListener('mouseup',resume);
  }, 300);
}
function shade(hex){
  // darken a hex color ~25% for gradient end
  try{ const c=hex.replace('#',''); const n=parseInt(c,16);
    let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
    r=Math.round(r*0.6);g=Math.round(g*0.6);b=Math.round(b*0.6);
    return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
  }catch(e){ return hex; }
}

let _userPos=null;
function haversine(lat1,lng1,lat2,lng2){
  const R=6371, toR=d=>d*Math.PI/180;
  const dLat=toR(lat2-lat1), dLng=toR(lng2-lng1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function getUserPos(){
  return new Promise(res=>{
    if(_userPos) return res(_userPos);
    if(!navigator.geolocation) return res(null);
    navigator.geolocation.getCurrentPosition(
      p=>{ _userPos={lat:p.coords.latitude,lng:p.coords.longitude}; res(_userPos); },
      ()=>res(null), {timeout:6000, maximumAge:300000});
  });
}
function distLabel(st){
  if(_userPos && st.lat!=null && st.lng!=null){
    const km=haversine(_userPos.lat,_userPos.lng,st.lat,st.lng);
    return km<1?`${Math.round(km*1000)} m away`:`${km.toFixed(2)} km away`;
  }
  return '';
}

// navigation helpers
function _navTarget(st){
  // prefer precise coordinates, else use the address text
  if(st.lat!=null && st.lng!=null) return {q:`${st.lat},${st.lng}`, isCoord:true};
  return {q: encodeURIComponent(st.address||st.name||''), isCoord:false};
}
function openMaps(id){
  const st=STORES.find(x=>String(x.id)===String(id)); if(!st) return;
  if(st.maps_url){ window.open(st.maps_url,'_blank'); return; }
  const t=_navTarget(st);
  window.open(`https://www.google.com/maps/search/?api=1&query=${t.q}`,'_blank');
}
function openWaze(id){
  const st=STORES.find(x=>String(x.id)===String(id)); if(!st) return;
  if(st.waze_url){ window.open(st.waze_url,'_blank'); return; }
  if(st.lat!=null && st.lng!=null){ window.open(`https://waze.com/ul?ll=${st.lat},${st.lng}&navigate=yes`,'_blank'); }
  else { window.open(`https://waze.com/ul?q=${encodeURIComponent(st.address||st.name||'')}&navigate=yes`,'_blank'); }
}
function copyAddress(id){
  const st=STORES.find(x=>String(x.id)===String(id)); if(!st) return;
  const text=st.address||'';
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast('Address copied ✓'),()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text){
  try{
    const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); ta.remove();
    toast('Address copied ✓');
  }catch(e){ toast('Could not copy'); }
}

function milestonesHtml(p){

  return `<div class="ms-wrap">

    ${rewards.sort((a,b)=>a.at_use-b.at_use).map(r=>{
      const used=p.used_uses||0;
      const isRedeemed = r.status==='redeemed';
      const isUnlocked = r.status==='unlocked' || (r.status!=='redeemed' && used>=r.at_use);
      const cls = isRedeemed?'redeemed':(isUnlocked?'unlocked':'locked');
      return `<div class="ms-item ${cls}">
        <div class="ms-badge">${isRedeemed?'✓':(isUnlocked?'🎉':r.at_use)}</div>
        <div class="ms-body">
          <div class="ms-label">${esc(r.label||'Reward')}</div>
          <div class="ms-sub">${isRedeemed?('Redeemed '+(r.redeemed_at?fmtDateTime(r.redeemed_at):'')):(isUnlocked?'Unlocked — ready to redeem':('Unlocks at use #'+r.at_use))}</div>

        ${isUnlocked&&!isRedeemed?`<button class="ms-show-btn" onclick="showRewardBarcode(${r.id})">Show code</button>`:''}
      </div>`;
    }).join('')}

}

function openMembership(){
  const tiers=[
    {key:1,name:STYLE.memTier1,card:STYLE.memCard1,ben:STYLE.memBenefits1},
    {key:2,name:STYLE.memTier2,card:STYLE.memCard2,ben:STYLE.memBenefits2},
    {key:4,name:STYLE.memTier4,card:STYLE.memCard4,ben:STYLE.memBenefits4},
    {key:5,name:STYLE.memTier5,card:STYLE.memCard5,ben:STYLE.memBenefits5}
  ];
  let active=1;
  const render=()=>{
    const t=tiers.find(x=>x.key===active)||tiers[0];
    const isNonMember = active===1;
    const userTier = PROFILE?.tier_level || 1; // 1 = non-member by default
    const isCurrent = active===userTier;
    const benList=(t.ben||'').split('\\n').filter(Boolean).map(b=>`<div class="mem-benefit"><span class="mem-tick">✓</span><span>${esc(b)}</span></div>`).join('');

    let cta;

    } else if(isCurrent){
      cta=`<div class="mem-current-tag">✓ Your current plan</div>`;
    } else {
      cta=`<button class="btn btn-primary" style="margin-top:16px" onclick="subscribeTier(${active},'${esc((t.name||'').replace(/'/g,"\\'"))}')">${esc(STYLE.memSubscribeBtn||'Subscribe Now')}</button>`;
    }
    appRoot.innerHTML=`
      <div class="topbar-app"><button class="back" onclick="goBack()">‹</button><div class="ttl">${esc(STYLE.memTitle||'All Membership Plan')}</div></div>
      <div class="app-scroll" style="padding-top:14px">
        <div class="mem-tabs">
          ${tiers.map(x=>`<div class="mem-tab ${x.key===active?'on':''}" data-tier="${x.key}">${esc(x.name||'')}</div>`).join('')}
        </div>
        <div class="mem-card">
          ${t.card?`<img src="${t.card}" style="width:100%;height:100%;object-fit:cover;border-radius:18px">
            <div class="mem-card-overlay"><div class="mem-card-tier">${esc(t.name||'')}</div><div class="mem-card-brand">GRANDLAB</div></div>`
          :`<div class="mem-card-placeholder"><div class="mem-card-tier">${esc(t.name||'')}</div><div class="mem-card-brand">GRANDLAB</div></div>`}
        </div>
        <div class="mem-tier-name">${esc(t.name||'')}${isNonMember?' <span class="mem-free">FREE</span>':''}</div>

function barePrice(s){

let _flashTimer=null;
function startFlashTimers(){
  if(_flashTimer) clearInterval(_flashTimer);
  const tick=()=>{
    const els=document.querySelectorAll('.flash-timer'); if(!els.length){ if(_flashTimer){clearInterval(_flashTimer);_flashTimer=null;} return; }
    const now=Date.now();
    els.forEach(el=>{
      const ends=el.getAttribute('data-ends'); if(!ends){ el.textContent='Limited'; return; }
      let diff=new Date(ends).getTime()-now;
      if(diff<=0){ el.textContent='Ended'; return; }
      const h=Math.floor(diff/3600000); diff-=h*3600000;
      const m=Math.floor(diff/60000); diff-=m*60000;
      const s=Math.floor(diff/1000);
      const dd=Math.floor(h/24);
      el.textContent = dd>0 ? `${dd}d ${h%24}h ${m}m` : `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    });
  };
  tick();
  _flashTimer=setInterval(tick,1000);
}

// resolve an addon entry {service_id, price} to a display object
function resolveAddon(a){
  // new format: linked service
  if(a && a.service_id!=null){
    const svc=SERVICES.find(x=>String(x.id)===String(a.service_id));
    return { label: svc?.name || a.label || 'Add-on',
             image_url: (svc && Array.isArray(svc.media)&&svc.media.length?svc.media[0].url:(svc?.image_url||a.image_url||null)),
             price: Number(a.price||0) };
  }
  // old format: manual
  return { label:a.label||'', image_url:a.image_url||null, price:Number(a.price||0) };
}

function svcDetailPrice(){
  const s=SVC_SEL.service; if(!s) return 0;
  let base=0;
  if(s.option_type && optionChoicesFor(s)){
    // option pricing: one price per choice (custom labels)
    const choiceLabel = currentOptionChoice();
    const ch = optionChoicesFor(s).find(c=>c.label===choiceLabel);
    base = Number(ch?.price||0);
  } else if(s.variations && s.variations.length){
    base=Number(s.variations[SVC_SEL.variIdx]?.price||0);
  } else if(s.price_by_type){
    base=Number(s.price_by_type[currentSizeType()]||0);
  } else {
    base=Number(s.base_price||0);
  }
  let total=base*SVC_SEL.qty;
  (s.addons||[]).forEach((a,i)=>{ if(SVC_SEL.addons[i]) total+=resolveAddon(a).price; });
  return total;
}
/* ---- Member rebate + points ----
   Rebate = instant % off at checkout for members only. NOT on flash deals.
   product vs service uses the service's rebate_kind (default service). */
function rebatePctFor(service){
  const tier = PROFILE?.tier_level || 1;
  if(tier < 2) return 0;                         // non-members: no rebate
  if(service && service._isFlash) return 0;      // flash deals: no rebate
  const kind = (service?.rebate_kind)||'service';
  const tbl = kind==='product' ? (STYLE.rebateProd||{}) : (STYLE.rebateSvc||{});
  const pct = Number(tbl[tier] ?? tbl[String(tier)] ?? 0);
  return (isNaN(pct)||pct<0) ? 0 : Math.min(pct,100);
}
function applyRebate(amount, service){
  const pct = rebatePctFor(service);
  const discount = Math.round(amount * pct) / 100;
  return { pct, discount, final: Math.max(0, amount - discount) };
}
function pointsForSpend(amountAfterRebate){
  const tier = PROFILE?.tier_level || 1;
  if(tier < 2) return 0;                          // members only
  const rm = Number(STYLE.pointRmPer||0);
  if(!rm || rm<=0) return 0;
  return Math.round(amountAfterRebate / rm);       // RM4=1pt, round nearest
}
function currentOptionChoice(){
  const s=SVC_SEL.service; const choices=optionChoicesFor(s); if(!choices) return null;
  const labels=choices.map(c=>c.label);
  return (SVC_SEL.optChoice && labels.includes(SVC_SEL.optChoice)) ? SVC_SEL.optChoice : labels[0];
}
// option choices: array of {label, price} set in admin
function optionChoicesFor(s){
  if(!s || !s.option_type || !Array.isArray(s.option_choices)) return null;
  const avail = s.option_choices.filter(c=>c.label && c.price!=null && c.price!=='');
  return avail.length ? avail : null;
}

// the size tier used for size-based pricing: from the selected car, else manual override, else first available
function currentSizeType(sizeMap){
  const s=SVC_SEL.service;
  const map = sizeMap || (s && s.price_by_type);
  if(!map) return null;
  const avail=Object.keys(map).filter(t=>map[t]!=null&&map[t]!=='');

  if(car && car.car_type && avail.includes(car.car_type)) return car.car_type;
  return avail[0]||null;
}

  if(_norm(currentSvc.category)!=='car wash') return '';

async function doCheckout(method){
  closePaymentSheet();
  const s=SVC_SEL.service; if(!s) return;
  const car = (VEHICLES||[]).find(v=>String(v.id)===String(SVC_SEL.carId));
  const carLabel = car ? ([car.make,car.model].filter(Boolean).join(' ') + (car.plate?' - '+car.plate:'') || 'Vehicle') : '';
  const vari = s.variations?.[SVC_SEL.variIdx]?.label || '';
  const store = STORES[SVC_SEL.storeIdx]?.name || '';
  const addonNames = (s.addons||[]).filter((a,i)=>SVC_SEL.addons[i]).map(a=>resolveAddon(a).label);
  const gross = svcDetailPrice();
  const reb = applyRebate(gross, s);
  const amt = reb.final;
  const noteBits=[];
  if(vari) noteBits.push('Variation: '+vari);
  if(SVC_SEL.qty>1) noteBits.push('Qty: '+SVC_SEL.qty);
  if(addonNames.length) noteBits.push('Add-ons: '+addonNames.join(', '));
  if(store) noteBits.push('Store: '+store);
  if(reb.discount>0) noteBits.push(`Member rebate ${reb.pct}%: -RM`+money(reb.discount));
  noteBits.push('Total: RM'+money(amt));
  const note=noteBits.join(' · ');
  const orderRef = 'GL'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,5).toUpperCase();
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/gl_orders`,{
      method:"POST",headers:Object.assign(authHeaders(),{Prefer:"return=representation"}),
      body:JSON.stringify({owner_id:SESSION.user.id,service_name:s.name,service_id:s.id,
        vehicle:carLabel, vehicle_id:car?.id||null, vehicle_label:carLabel,
        appointment_date:null,appointment_time:null,note:note,status:'upcoming',
        amount:amt, order_ref:orderRef,
        payment_method:method, payment_status: method==='counter'?'unpaid':'unpaid'})});
    if(r.ok){
      const orderRow=(await r.json())[0];
      // multi-use package handling (only finalize package on PAID or counter; for online we still create on return)
      if(method==='counter'){
        await afterOrderCreated(s, car, carLabel);
        const earned = await awardPoints(amt, 'Booking: '+s.name);
        toast(earned>0 ? `Booked ✓ — pay at outlet · +${earned} G Coin` : "Booked ✓ — pay at outlet"); routeTab('order'); return;
      }
      // online → get senangPay URL from the edge function and redirect
      toast("Opening payment…");
      const pr=await fetch(`${SENANGPAY_FN}/create`,{
        method:"POST",headers:{'Content-Type':'application/json'},
        body:JSON.stringify({order_ref:orderRef, amount:amt,
          name:(PROFILE?.name||SESSION?.user?.user_metadata?.name||'Customer'),
          email:(SESSION?.user?.email||''),
          phone:(PROFILE?.phone||''),
          detail:('Grandlab '+s.name).slice(0,200)})});
      if(pr.ok){
        const data=await pr.json();
        if(data.pay_url){ window.location.href=data.pay_url; return; }
      }
      toast("Couldn't open payment — try Pay at outlet");
    } else { toast("Could not place order"); }
  }catch(e){ toast("Order error"); }
}
// create package + milestone rewards after an order is placed (used by counter + paid online)
async function awardPoints(amountAfterRebate, reason){
  try{
    const pts = pointsForSpend(amountAfterRebate);
    if(pts<=0) return 0;
    const newPts = Number(PROFILE?.points||0) + pts;
    await fetch(`${SUPA_URL}/rest/v1/gl_profiles?id=eq.${SESSION.user.id}`,{
      method:"PATCH",headers:authHeaders(),body:JSON.stringify({points:newPts})});
    if(PROFILE) PROFILE.points=newPts;
    // ledger entry
    await fetch(`${SUPA_URL}/rest/v1/gl_point_txns`,{
      method:"POST",headers:authHeaders(),
      body:JSON.stringify({owner_id:SESSION.user.id, delta:pts, reason:'spend', ref:(reason||'Purchase')})}).catch(()=>{});
    return pts;
  }catch(e){ return 0; }
}
async function afterOrderCreated(s, car, carLabel){
  const uses = Number(s.pkg_uses||0);
  if(uses>1){
    const barcode = genBarcodeValue();
    const pr=await fetch(`${SUPA_URL}/rest/v1/gl_packages`,{
      method:"POST",headers:Object.assign(authHeaders(),{Prefer:"return=representation"}),
      body:JSON.stringify({owner_id:SESSION.user.id, vehicle_id:car?.id||null, vehicle_label:carLabel,
        service_id:s.id, service_name:s.name, pkg_type:s.pkg_type||'custom',
        total_uses:uses, used_uses:0, barcode:barcode, status:'active', source:'app'})});
    if(pr.ok){
      const pkgRow=(await pr.json())[0];
      const ms=Array.isArray(s.milestones)?s.milestones:[];
      if(pkgRow && ms.length){
        const rows=ms.filter(m=>m && m.at).map(m=>({
          package_id:pkgRow.id, owner_id:SESSION.user.id, at_use:Number(m.at),
          service_id:m.service_id||null, label:m.label||'Reward',
          barcode:genBarcodeValue(), status:'locked'}));
        if(rows.length){
          await fetch(`${SUPA_URL}/rest/v1/gl_package_rewards`,{
            method:"POST",headers:authHeaders(),body:JSON.stringify(rows)});
        }
      }
    }
    PACKAGES=[];
  }
}

async function handlePayReturn(){
  const pr=window._PAY_RETURN; if(!pr) return;
  window._PAY_RETURN=null;
  if(pr.result==='success'){
    toast('Payment successful ✓');
    // fetch the paid order and finalize any package/milestones
    try{
      const r=await fetch(`${SUPA_URL}/rest/v1/gl_orders?select=*&order_ref=eq.${encodeURIComponent(pr.ref)}`,{headers:authHeaders()});
      if(r.ok){
        const rows=await r.json(); const ord=rows[0];
        if(ord){
          // wallet top-up paid → credit wallet (amount + bonus)
          if(ord.status==='topup' && ord.topup_amount){
            const credit=Number(ord.topup_amount)+Number(ord.topup_bonus||0);
            const newBal=Number(PROFILE?.wallet||0)+credit;
            await fetch(`${SUPA_URL}/rest/v1/gl_profiles?id=eq.${SESSION.user.id}`,{method:"PATCH",headers:authHeaders(),body:JSON.stringify({wallet:newBal})});
            if(PROFILE) PROFILE.wallet=newBal;
            toast('Wallet topped up +RM'+credit.toFixed(2)+' ✓');
            routeTab('wallet'); return;
          }
          // gift card paid → handled server-side ideally; show confirmation

            toast('Gift sent ✓');

          }
          const svc=(SERVICES||[]).find(x=>String(x.id)===String(ord.service_id));

          if(svc) await afterOrderCreated(svc, car, ord.vehicle_label||'');
          const earned = await awardPoints(Number(ord.amount||0), 'Purchase: '+(ord.service_name||''));
          if(earned>0) toast(`+${earned} G Coin earned ✓`);
        }
      }
    }catch(e){}
    routeTab('order');
  } else {
    toast('Payment not completed');
    routeTab('order');

// reads coating maintenance due dates from service records (POS writes next_due)
async function fetchMaintenanceReminders(){
  if(!SESSION?.user?.id) return [];
  let recs=[];
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/gl_service_records?select=*&owner_id=eq.${SESSION.user.id}&next_due=not.is.null&order=next_due.asc`,{headers:authHeaders()});
    if(r.ok) recs=await r.json();
  }catch(e){ return []; }
  const today=new Date(); today.setHours(0,0,0,0);
  const out=[];
  // keep only the soonest reminder per vehicle+service, due within 7 days (or overdue)
  const seen={};
  recs.forEach(rec=>{
    if(!rec.next_due) return;
    const due=new Date(rec.next_due); due.setHours(0,0,0,0);
    const days=Math.round((due-today)/86400000);
    if(days>7) return; // not due soon yet
    const key=(rec.vehicle_id||'')+'|'+(rec.service_name||'');
    if(seen[key]) return; seen[key]=1;
    out.push({ service_name:rec.service_name, service_id:rec.service_id, vehicle_label:rec.vehicle_label,
      due_date:rec.next_due, due_in_days:Math.max(0,days) });
  });
  return out;
}

function renderCalendar(){
  const today=new Date(); today.setHours(0,0,0,0);
  const max=new Date(today); max.setDate(max.getDate()+(BOOKING_CFG.daysAhead||30));
  const y=_bkMonth.getFullYear(), m=_bkMonth.getMonth();
  const first=new Date(y,m,1); const startDow=first.getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const monthName=_bkMonth.toLocaleDateString('en-MY',{month:'long',year:'numeric'});
  // prev/next allowed within range
  const prevOk=new Date(y,m,1)>new Date(today.getFullYear(),today.getMonth(),1);
  const nextOk=new Date(y,m+1,1)<=max;
  let cells='';
  ['S','M','T','W','T','F','S'].forEach(d=>cells+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<startDow;i++) cells+=`<div></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateObj=new Date(y,m,d); dateObj.setHours(0,0,0,0);
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const past=dateObj<today;
    const beyond=dateObj>max;
    const closed=bkClosed(ds,dateObj);
    const disabled=past||beyond||closed;
    const sel=_bkState.date===ds;
    cells+=`<div class="cal-day ${disabled?'off':''} ${sel?'sel':''} ${closed&&!past?'closed':''}" ${disabled?'':`onclick="_bkPickDate('${ds}')"`}>${d}${closed&&!past&&!beyond?'<span class="cal-x">×</span>':''}</div>`;
  }
  return `
    <div class="cal-head">
      <button class="cal-nav" ${prevOk?`onclick="_bkMonth.setMonth(_bkMonth.getMonth()-1);document.getElementById('bk-cal').innerHTML=renderCalendar()"`:'disabled'}>‹</button>
      <div class="cal-month">${monthName}</div>
      <button class="cal-nav" ${nextOk?`onclick="_bkMonth.setMonth(_bkMonth.getMonth()+1);document.getElementById('bk-cal').innerHTML=renderCalendar()"`:'disabled'}>›</button>
    </div>
    <div class="cal-grid">${cells}</div>`;
}

async function loadSlots(){
  const el=document.getElementById('bk-slots'); if(!el) return;
  el.innerHTML='<div class="bk-slots-hint">Loading slots…</div>';
  // fetch bookings already made for this date to count per-time usage
  let counts={};
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/gl_orders?select=appointment_time&appointment_date=eq.${_bkState.date}&status=eq.upcoming`,{headers:authHeaders()});
    if(r.ok){ const rows=await r.json(); rows.forEach(o=>{ if(o.appointment_time){ counts[o.appointment_time]=(counts[o.appointment_time]||0)+1; } }); }
  }catch(e){}
  const cap=BOOKING_CFG.slotsPerTime||2;
  el.innerHTML=`<div class="slot-grid">${BOOKING_CFG.times.map(t=>{
    const used=counts[t]||0; const left=cap-used; const full=left<=0;
    const sel=_bkState.time===t;
    return `<div class="slot ${full?'full':''} ${sel?'sel':''}" ${full?'':`onclick="_bkPickTime('${t}')"`}>
      <div class="slot-time">${t}</div>
      <div class="slot-left">${full?'Full':left+' left'}</div>
    </div>`;
  }).join('')}</div>`;
}

// Config (editable in admin → gl_settings id='wallet'). Defaults here.
let WALLET_CFG = {
  tiers: [   // amount, bonus % (pay-now). Pay-at-shop gives half this %.
    {amount:100,  pct:1},
    {amount:200,  pct:2},
    {amount:500,  pct:5},
    {amount:1000, pct:10},
    {amount:5000, pct:15}
  ],
  shopBonusFactor: 0.5,   // pay-at-shop gets 50% of the pay-now bonus
  giftAmounts: [25,50,100,150,200],
  giftMin: 25
};
function walletBonusPct(amount, payNow){
  // find the highest tier the amount qualifies for
  let pct=0;
  WALLET_CFG.tiers.slice().sort((a,b)=>a.amount-b.amount).forEach(t=>{ if(amount>=t.amount) pct=t.pct; });
  return payNow ? pct : pct*WALLET_CFG.shopBonusFactor;
}
function openTopUp(){
  if(IS_GUEST){ toast('Sign in to top up'); return; }
  let chosen = WALLET_CFG.tiers[0]?.amount || 100;
  let payNow = true;
  const render=()=>{
    const bonusNow = walletBonusPct(chosen,true);
    const bonusShop= walletBonusPct(chosen,false);
    const extra = chosen * (payNow?bonusNow:bonusShop)/100;
    const tiles = WALLET_CFG.tiers.map(t=>`
      <div class="tu-tile ${chosen===t.amount?'on':''}" onclick="_tuPick(${t.amount})">

        </div>

async function confirmTopUp(amount, payNow){
  if(amount < WALLET_CFG.giftMin){ toast('Minimum RM'+WALLET_CFG.giftMin); return; }
  const bonus = amount * walletBonusPct(amount,payNow)/100;
  if(payNow){
    if(!SENANGPAY_FN){ toast('Online payment not set up yet'); return; }
    // create a topup order + redirect to senangPay
    const orderRef='TU'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,5).toUpperCase();
    try{
      await fetch(`${SUPA_URL}/rest/v1/gl_orders`,{method:"POST",headers:authHeaders(),
        body:JSON.stringify({owner_id:SESSION.user.id, service_name:'Wallet Top-Up', note:'Top-up RM'+amount+' (+RM'+bonus.toFixed(2)+' bonus)',
          amount:amount, order_ref:orderRef, payment_method:'senangpay', payment_status:'unpaid', status:'topup',
          topup_amount:amount, topup_bonus:bonus})});
      toast('Opening payment…');
      const pr=await fetch(`${SENANGPAY_FN}/create`,{method:"POST",headers:{'Content-Type':'application/json'},
        body:JSON.stringify({order_ref:orderRef, amount:amount, name:(PROFILE?.name||'Customer'),
          email:(SESSION?.user?.email||''), phone:(PROFILE?.phone||''), detail:'Grandlab Wallet Top-Up'})});
      if(pr.ok){ const d=await pr.json(); if(d.pay_url){ window.location.href=d.pay_url; return; }
        const em=(d.doku_response&&(d.doku_response.error_messages||d.doku_response.message))||d.error||'unknown';
        alert('Payment error:\n'+JSON.stringify(em)); console.log('DOKU error detail:',d);
      } else { const t=await pr.text(); alert('Payment failed ('+pr.status+'):\n'+t); }
      toast("Couldn't open payment");
    }catch(e){ toast('Error — try again'); }
  } else {
    // pay at shop → create a pending top-up the POS will confirm on payment
    try{
      await fetch(`${SUPA_URL}/rest/v1/gl_orders`,{method:"POST",headers:authHeaders(),
        body:JSON.stringify({owner_id:SESSION.user.id, service_name:'Wallet Top-Up (pay at shop)',
          note:'Top-up RM'+amount+' (+RM'+bonus.toFixed(2)+' bonus) — pay at outlet',
          amount:amount, payment_method:'counter', payment_status:'unpaid', status:'topup',
          topup_amount:amount, topup_bonus:bonus})});
      toast('Top-up reserved ✓ — pay at outlet to activate');
      routeTab('wallet');
    }catch(e){ toast('Error — try again'); }
  }
}

async function redeemReward(id, cost, name){
  const coins = PROFILE?.points||0;
  if(coins < cost){ toast(`Not enough ${STYLE.coinName||'points'} — you need ${cost}`); return; }
  if(!confirm(`Redeem "${name}" for ${cost} ${STYLE.coinName||'points'}?`)) return;
  const barcode = genBarcodeValue();
  try{
    // create a redeemable voucher (barcode) the staff can scan
    await fetch(`${SUPA_URL}/rest/v1/gl_claims`,{method:"POST",headers:authHeaders(),
      body:JSON.stringify({owner_id:SESSION.user.id, label:name, barcode:barcode, status:'active', source:'reward', coin_cost:cost})});
    // deduct points
    const newPts=Math.max(0,coins-cost);
    await fetch(`${SUPA_URL}/rest/v1/gl_profiles?id=eq.${SESSION.user.id}`,{method:"PATCH",headers:authHeaders(),body:JSON.stringify({points:newPts})});
    if(PROFILE) PROFILE.points=newPts;
    // log redemption history
    await fetch(`${SUPA_URL}/rest/v1/gl_redemptions`,{method:"POST",headers:authHeaders(),
      body:JSON.stringify({owner_id:SESSION.user.id,reward_name:name,coin_cost:cost,status:'active',barcode:barcode})}).catch(()=>{});
    CLAIMS=[];
    toast('Redeemed ✓ Find it in Vouchers');
    openVouchers();
  }catch(e){ toast('Could not redeem — try again'); }
}

  const notif=getPref('notif','on');
  const tg=(on)=>`<div class="tg ${on?'on':''}"><div class="tg-dot"></div></div>`;
  subPage('Settings', `
    <div class="sec-title">Notifications</div>
    <div class="acc-list">
      <div class="acc-row" onclick="toggleNotif()"><div class="acc-row-label">Push notifications</div><div class="acc-row-right">${tg(notif==='on')}</div></div>
    </div>
    <div class="sec-title">Account</div>
    <div class="acc-list">
      <div class="acc-row" onclick="logout()"><div class="acc-row-label">Log out</div><div class="acc-row-right"><span class="acc-chev">›</span></div></div>
      <div class="acc-row" onclick="confirmDeleteAccount()"><div class="acc-row-label" style="color:#E5533C">Delete account</div><div class="acc-row-right"><span class="acc-chev">›</span></div></div>
    </div>
    <div class="settings-note">Deleting your account removes your profile, cars, packages and history. This cannot be undone.</div>
  `);
}
function setTheme(t){ setPref('theme',t); applyTheme(t); openSettings(); }
function applyTheme(t){
  let mode=t;
  if(t==='auto'){ mode = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light':'dark'; }
  document.documentElement.setAttribute('data-theme', mode);
}
function toggleNotif(){
  const cur=getPref('notif','on'); const next=cur==='on'?'off':'on';
  setPref('notif',next);
  if(next==='on' && 'Notification' in window && Notification.permission!=='granted'){
    Notification.requestPermission().catch(()=>{});
  }
  openSettings();
}
function confirmDeleteAccount(){
  if(!confirm('Delete your account permanently? This removes your profile, cars, packages and history and cannot be undone.')) return;
  if(!confirm('Are you absolutely sure? This is your last chance to cancel.')) return;
  deleteMyAccount();
}
async function deleteMyAccount(){
  try{
    if(SESSION?.user?.id){
      // soft-delete profile data; auth user removal needs server-side, so flag it
      await fetch(`${SUPA_URL}/rest/v1/gl_profiles?id=eq.${SESSION.user.id}`,{method:"PATCH",headers:authHeaders(),body:JSON.stringify({deleted:true,name:null,phone:null})});
    }
  }catch(e){}
  toast('Account deleted');
  logout();
}

// --- Share Feedback ---
let FB_PHOTOS=[];
function openFeedback(){
  FB_PHOTOS=[];
  subPage('Share Feedback', `
    <div class="app-sub" style="margin-bottom:14px">Tell us what went wrong or how we can improve.</div>
    <label class="fb-label">Issue encountered</label>
    <select id="fb-issue" class="fb-input">
      <option value="">Choose an issue…</option>
      <option>App bug / something not working</option>
      <option>Booking / appointment problem</option>
      <option>Payment / wallet issue</option>
      <option>Service quality</option>
      <option>Pricing question</option>
      <option>Suggestion / feature request</option>
      <option>Other</option>
    </select>
    <label class="fb-label">Your message</label>
    <textarea id="fb-msg" class="fb-input" rows="5" placeholder="Describe the issue…"></textarea>
    <label class="fb-label">Upload image <span id="fb-count" style="color:var(--muted)">0/5</span></label>
    <div id="fb-photos" class="fb-photos"></div>
    <input type="file" id="fb-file" accept="image/*" multiple onchange="fbAddPhotos(this)" style="margin-top:8px">
    <button class="btn btn-primary" style="margin-top:18px;width:100%" onclick="submitFeedback()">Submit feedback</button>
  `);
}
function fbAddPhotos(input){
  const files=[...input.files];
  for(const f of files){
    if(FB_PHOTOS.length>=5){ toast('Max 5 photos'); break; }
    const reader=new FileReader();
    reader.onload=()=>{ FB_PHOTOS.push(reader.result); renderFbPhotos(); };
    reader.readAsDataURL(f);
  }
  input.value='';
}
function renderFbPhotos(){
  const el=document.getElementById('fb-photos'); if(el) el.innerHTML=FB_PHOTOS.map((src,i)=>`<div class="fb-thumb"><img src="${src}"><span class="fb-thumb-x" onclick="FB_PHOTOS.splice(${i},1);renderFbPhotos()">✕</span></div>`).join('');
  const c=document.getElementById('fb-count'); if(c) c.textContent=FB_PHOTOS.length+'/5';
}
async function submitFeedback(){
  const issue=document.getElementById('fb-issue')?.value;
  const msg=document.getElementById('fb-msg')?.value.trim();
  if(!issue){ toast('Please choose an issue'); return; }
  if(!msg){ toast('Please add a message'); return; }
  try{
    await fetch(`${SUPA_URL}/rest/v1/gl_feedback`,{method:"POST",headers:authHeaders(),
      body:JSON.stringify({owner_id:SESSION?.user?.id||null, name:PROFILE?.name||null, phone:PROFILE?.phone||null,
        issue, message:msg, photos:FB_PHOTOS.length?FB_PHOTOS:null})});
    toast('Feedback sent ✓ — thank you');
    routeTab('account');
  }catch(e){ toast('Could not send — try again'); }
}

      <div class="field"><label>${STYLE.pfEmailLabel||'Email'} *</label><input id="ps-email" type="email" placeholder="${STYLE.pfEmailPlaceholder||'you@email.com'}"></div>

    </div>`;
  document.getElementById('ps-save').onclick=async()=>{

    const email=document.getElementById('ps-email').value.trim();
    const phone=document.getElementById('ps-phone').value.trim();

    // generate this user's own referral code if they don't have one
    if(!PROFILE?.referral_code){ fields.referral_code = await uniqueRefCode(name); }

    else err.textContent="Couldn't save — try again.";

// build a 6-char code from name initials + random digits, ensure uniqueness
async function uniqueRefCode(name){
  const letters=(name||'GL').toUpperCase().replace(/[^A-Z]/g,'').slice(0,3).padEnd(3,'X');
  for(let tries=0;tries<6;tries++){
    const num=String(Math.floor(Math.random()*1000)).padStart(3,'0');
    const code=letters+num;
    try{
      const r=await fetch(`${SUPA_URL}/rest/v1/gl_profiles?select=id&referral_code=eq.${code}`,{headers:authHeaders()});
      if(r.ok){ const rows=await r.json(); if(!rows.length) return code; }
    }catch(e){ return code; }
  }
  return letters+String(Date.now()%1000).padStart(3,'0');
}


/* ---------- Navigation between screens ---------- */
let screenOrder=[]; // dom refs in order
let cur=0;
function indexScreens(){ screenOrder=[...screensEl.children]; }

function showStep(idx){
  indexScreens();
  screenOrder.forEach((s,i)=>{
    s.classList.remove('show','exit-left');
    if(i<idx) s.classList.add('exit-left');
  });
  const target=screenOrder[idx];
  target.classList.add('show');
  cur=idx;
  // rail tracks onboarding + welcome only
  stepIndex = Math.min(idx, totalSteps-1);
  updateRail();
  if(target._onShow) target._onShow();
}
function goTo(idx, isAuth){
  if(idx<0) idx=0;
  if(idx>=screenOrder.length) idx=screenOrder.length-1;
  showStep(idx);
}
function screenIndexByKind(kind){ indexScreens(); return screenOrder.findIndex(s=>s.dataset.kind===kind); }
function openReferral(){ const i=screenIndexByKind('referral'); if(i>=0) showStep(i); }
function openAuth(){ const i=screenIndexByKind('phone'); if(i>=0) showStep(i); } // phone screen

/* keep stepIndex usable by onboarding handlers */
Object.defineProperty(window,'stepIndex',{get:()=>cur,set:v=>{cur=v;}});

/* ---------- Init ---------- */
(async function init(){
  // apply saved theme (dark/light/auto)
  try{ applyTheme(localStorage.getItem('gl_pref_theme')||'dark'); }catch(e){}
  // handle return from senangPay payment
  try{
    const qp=new URLSearchParams(location.search);
    const payResult=qp.get('pay'), payRef=qp.get('ref');
    if(payResult && payRef){
      // clean the URL so refresh doesn't re-trigger
      history.replaceState({}, '', location.pathname);
      // wait until session loads, then handle
      window._PAY_RETURN={result:payResult, ref:payRef};
    }
  }catch(e){}
  // TEMP: preview the main page directly (no login)
  if(PREVIEW_HOME){
    await Promise.allSettled([
      fetchSlides(), fetchServices(), fetchCategories(), fetchStores(), fetchBrands(), fetchCarBrands(), fetchFlash()
    ]);
    try{ render(); indexScreens(); }catch(e){ console.error('render failed', e); }
    try{ enterGuest(); }catch(e){ console.error('enterGuest failed', e); }
    return;
  }
  // already logged in? go straight to the app
  loadSession();
  if(SESSION?.access_token){
    // run all loads in parallel instead of one-by-one (much faster startup)
    const results = await Promise.allSettled([
      fetchSlides(),      // loads STYLE too
      fetchProfile(),
      fetchServices(),
      fetchCategories(),
      fetchStores(),
      fetchBrands(), fetchCarBrands(), fetchFlash()
    ]);
    const prof = results[1].status==='fulfilled' ? results[1].value : null;
    render();                     // build onboarding stack (hidden) for fallback
    indexScreens();
    // if the session is dead/invalid (no profile came back at all), clear it and show normal flow
    if(prof===null && !PROFILE){
      console.warn('Session invalid or profile missing — clearing session');
      localStorage.removeItem('gl_session'); SESSION=null;
      showStep(0);
      return;
    }
    if(PROFILE && PROFILE.name){ enterApp('home'); }
    else { enterApp('profile'); }
    handlePayReturn();
    return;
  }
  await fetchSlides();
  render();
  indexScreens();
})();
</script>
