<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0A0A0A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Grandlab Detailing</title>
<style>
  :root{
    --bg:#0A0A0A; --surface:#141414; --surface2:#1C1C1C;
    --yellow:#F5C518; --yellow-dim:#C9A20F;
    --text:#FFFFFF; --muted:#8A8A8A; --line:#2A2A2A;
    --ease:cubic-bezier(.22,.61,.36,1);
    /* premium gradient + gold-line theme */
    --card-grad:linear-gradient(150deg,#1b1a17 0%,#121110 55%,#0c0c0b 100%);
    --card-grad-gold:linear-gradient(150deg,#211d12 0%,#141210 60%,#0d0c0a 100%);
    --gold-line:rgba(245,197,24,.32);
    --gold-line-soft:rgba(245,197,24,.16);
    --gold-glow:0 0 0 1px rgba(245,197,24,.10), 0 8px 30px -12px rgba(0,0,0,.7);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a0a;}
  html,body{background:#0a0a0a;}
  body{
    background:#0a0a0a; color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue","Roboto",sans-serif;
    font-size:14.5px; line-height:1.45; letter-spacing:-0.01em;
    overflow:hidden; position:fixed; top:0; left:0; right:0; bottom:0;
    height:auto;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:flex; justify-content:center;
  }
  /* phone-shaped on desktop, full-bleed on real phones */
  .app{height:100%;width:100%;max-width:440px;display:flex;flex-direction:column;
    background:var(--bg);position:relative;
    box-shadow:0 0 80px -20px rgba(245,197,24,.08);}
  .safe-top{padding-top:env(safe-area-inset-top);}
  .safe-bottom{padding-bottom:env(safe-area-inset-bottom);}
  /* rail sits below the status bar */
  .rail{padding-top:calc(18px + env(safe-area-inset-top));}

  /* ---------- Progress rail ---------- */
  .rail{display:flex;gap:6px;padding:18px 22px 0;margin:0 auto;width:var(--rail-length,100%);}
  .rail .seg{flex:1;height:var(--rail-thickness,3px);border-radius:3px;background:var(--line);overflow:hidden;}
  .rail .seg i{display:block;height:100%;width:0;background:var(--rail-color,var(--yellow));
    transition:width .45s var(--ease);}
  .rail .seg.done i{width:100%;}
  .rail .seg.active i{width:100%;}

  /* ---------- Screens ---------- */
  .screens{flex:1;position:relative;overflow:hidden;min-height:0;}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;
    padding:0 26px;opacity:0;transform:translateX(28px);
    transition:opacity .4s var(--ease),transform .4s var(--ease);
    pointer-events:none;}
  .screen.show{opacity:1;transform:none;pointer-events:auto;}
  .screen.exit-left{transform:translateX(-28px);}

  /* onboarding layout presets (reorder text vs art) */
  .screen.ob-text-top .ob-eyebrow{order:1} .screen.ob-text-top .ob-title{order:2}
  .screen.ob-text-top .ob-art{order:3} .screen.ob-text-top .ob-foot{order:4}
  .screen.ob-text-bottom{display:flex;flex-direction:column}
  .screen.ob-text-bottom .ob-art{order:1;margin-top:40px} .screen.ob-text-bottom .ob-eyebrow{order:2;margin-top:10px}
  .screen.ob-text-bottom .ob-title{order:3} .screen.ob-text-bottom .ob-foot{order:4}
  .screen.ob-text-center{display:flex;flex-direction:column}
  .screen.ob-text-center .ob-art{order:1;margin-top:30px} .screen.ob-text-center .ob-eyebrow{order:2;text-align:center}
  .screen.ob-text-center .ob-title{order:3;text-align:center;margin-left:auto;margin-right:auto}
  .screen.ob-text-center .ob-foot{order:4}
  .screen[class*="ob-"]{display:flex;flex-direction:column}

  /* full-screen slide background (photo/video) — fills the whole phone, edge to edge */
  .ob-bg{position:absolute;
    top:calc(-1 * (env(safe-area-inset-top) + 80px));
    bottom:calc(-1 * (env(safe-area-inset-bottom) + 120px));
    left:-26px;right:-26px;
    z-index:0;overflow:hidden;}
  /* welcome screen: background must reach the very bottom (under home bar) */
  .welcome .ob-bg{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:440px;height:100dvh;}
  .ob-bg img,.ob-bg video{width:100%;height:100%;object-fit:cover;}
  .ob-bg-dim{position:absolute;inset:0;}
  .screen>*:not(.ob-bg){position:relative;z-index:1;}

  /* ---------- Onboarding ---------- */
  .ob-eyebrow{margin-top:54px;font-size:var(--eyebrow-size,15px);letter-spacing:.14em;
    text-transform:uppercase;color:var(--eyebrow-color,var(--yellow));
    font-weight:var(--eyebrow-weight,600);font-style:var(--eyebrow-style,normal);
    text-decoration:var(--eyebrow-deco,none);text-align:var(--eyebrow-align,left);}
  .ob-title{margin-top:14px;font-size:var(--title-size,40px);line-height:1.04;
    letter-spacing:-.02em;max-width:11ch;color:var(--title-color,var(--text));
    font-weight:var(--title-weight,800);font-style:var(--title-style,normal);
    text-decoration:var(--title-deco,none);text-align:var(--title-align,left);}
  .ob-art{flex:1;display:flex;align-items:center;justify-content:center;position:relative;}
  .ob-panel{
    width:var(--panel-size,78%);max-width:360px;aspect-ratio:1/1.05;border-radius:26px;
    background:linear-gradient(150deg,var(--surface2),#0d0d0d);
    border:1px solid var(--line);position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 30px 60px -30px #000;
  }
  /* specular streak — light moving over fresh coating */
  /* when panel holds a photo/video, drop the card frame — show media clean */
  .ob-panel.has-media{background:transparent;border:none;box-shadow:none;aspect-ratio:auto;overflow:visible;width:92%;max-width:440px;}
  .ob-panel.has-media img{width:100%;height:auto !important;max-height:58vh;object-fit:contain !important;}
  .ob-panel.has-media.ob-video video{width:100%;height:auto;max-height:46vh;object-fit:contain;border-radius:18px;}
  .ob-panel.ob-video{padding:0;}
  .ob-panel.ob-video video{width:100%;height:100%;object-fit:cover;}
  .ob-panel.ob-video::after{display:none;}
  .ob-panel::after{
    content:"";position:absolute;top:-60%;left:-40%;width:60%;height:220%;
    transform:rotate(18deg);
    background:linear-gradient(90deg,transparent,rgba(245,197,24,.16),transparent);
    animation:sweep 4.5s var(--ease) infinite;
  }
  @keyframes sweep{0%{left:-50%}55%{left:130%}100%{left:130%}}
  .ob-glyph{font-size:120px;filter:grayscale(.1);}
  .ob-foot{margin-top:auto;padding:0 0 16px;}
  .ob-nav{display:flex;gap:14px;}

  /* ---------- Buttons ---------- */
  .btn{height:var(--btn-height,58px);border-radius:18px;border:none;font-size:17px;font-weight:700;
    display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;
    width:100%;transition:transform .12s var(--ease),opacity .2s;letter-spacing:.01em;}
  .btn:active{transform:scale(.975);}
  .btn-primary{background:var(--btn-color,var(--yellow));color:#0A0A0A;}
  .btn-primary:disabled{background:var(--surface2);color:var(--muted);}
  .btn-ghost{background:transparent;color:var(--text);border:1.5px solid var(--line);}
  .btn-yellow-ghost{background:transparent;color:var(--yellow);border:1.5px solid var(--yellow-dim);}
  .btn-half{flex:1;}

  /* ---------- Welcome ---------- */
  .welcome{justify-content:flex-start;}
  .welcome .wel-mark{flex:1;}
  /* welcome layout presets */
  .welcome.wel-logo-top .wel-mark{order:1;flex:0;margin-top:30px}
  .welcome.wel-logo-top .wel-top{order:2;margin-top:24px}
  .welcome.wel-logo-top .wel-actions{order:3}
  .welcome.wel-logo-center .wel-top{order:1} .welcome.wel-logo-center .wel-mark{order:2}
  .welcome.wel-logo-center .wel-actions{order:3}
  .welcome.wel-logo-bottom .wel-top{order:1} .welcome.wel-logo-bottom .wel-actions{order:2}
  .welcome.wel-logo-bottom .wel-mark{order:3;flex:0;margin-bottom:30px}
  .wel-top{margin-top:calc(64px + env(safe-area-inset-top));}
  .wel-mark{display:flex;flex-direction:column;align-items:center;gap:18px;
    flex:1;justify-content:center;}
  .wel-logo{width:var(--logo-size,96px);height:var(--logo-size,96px);object-fit:contain;}
  .wel-name{font-size:34px;font-weight:800;letter-spacing:-.02em;}
  .wel-h{font-size:var(--wel-h-size,32px);font-weight:800;letter-spacing:-.02em;line-height:1.1;}
  .wel-sub{margin-top:14px;color:var(--muted);font-size:var(--wel-sub-size,16px);line-height:1.5;max-width:30ch;}
  .wel-actions{display:flex;flex-direction:column;gap:12px;padding-bottom:calc(var(--wel-bottom-gap,30px) + env(safe-area-inset-bottom));margin-top:var(--wel-btn-topgap,0px);}

  /* ---------- Auth ---------- */
  .auth{padding-top:60px;}
  .auth-h{font-size:30px;font-weight:800;letter-spacing:-.02em;}
  .auth-sub{margin-top:12px;color:var(--muted);font-size:15px;line-height:1.55;}
  .field-label{margin-top:34px;font-size:13px;font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted);}
  .phone-row{margin-top:12px;display:flex;align-items:center;gap:10px;
    background:var(--surface);border:1.5px solid var(--line);border-radius:16px;
    padding:0 16px;height:60px;transition:border-color .2s;}
  .phone-row:focus-within{border-color:var(--yellow);}
  .cc{font-size:18px;font-weight:700;color:var(--text);}
  .cc-div{width:1px;height:24px;background:var(--line);}
  .phone-row input{flex:1;background:none;border:none;outline:none;color:var(--text);
    font-size:18px;font-weight:500;font-family:inherit;letter-spacing:.02em;}
  .phone-row input::placeholder{color:#5a5a5a;}
  .helper{margin-top:12px;font-size:13px;color:var(--muted);min-height:18px;}
  .helper.err{color:#ff6b6b;}

  /* ---------- OTP ---------- */
  .otp-row{margin-top:18px;display:flex;gap:10px;justify-content:space-between;}
  .otp-cell{flex:1;aspect-ratio:1/1.15;background:var(--surface);
    border:1.5px solid var(--line);border-radius:14px;display:flex;
    align-items:center;justify-content:center;font-size:26px;font-weight:700;
    transition:border-color .2s,background .2s;}
  .otp-cell.filled{border-color:var(--yellow);background:#181403;}
  .otp-cell.cursor{border-color:var(--yellow);}
  .otp-hidden{position:absolute;opacity:0;pointer-events:none;}
  .resend{margin-top:26px;text-align:center;font-size:14px;color:var(--muted);}
  .resend b{color:var(--yellow);font-weight:600;}
  .auth-foot{margin-top:auto;padding-bottom:32px;}

  .link-row{margin-top:20px;text-align:center;font-size:14px;color:var(--muted);}
  .link-row span{color:var(--yellow);font-weight:600;}

  /* spartan glyph using simple svg */
  .spinner{width:20px;height:20px;border:2.5px solid rgba(10,10,10,.3);
    border-top-color:#0A0A0A;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition-duration:.01ms!important;}
  }
  /* OTP layout presets */
  .screen.otp-center{justify-content:center;}
  .screen.otp-center .otp-row{margin-left:auto;margin-right:auto;}
  .screen.otp-top{justify-content:flex-start;}

  /* Referral page */
  .ref-content{flex:1;display:flex;flex-direction:column;}
  .screen.ref-top .ref-content{justify-content:flex-start;padding-top:30px;}
  .screen.ref-center .ref-content{justify-content:center;}
  .ref-card{margin-top:18px;background:var(--surface);border:1px solid var(--line);
    border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px;}
  .ref-card-ic{font-size:30px;}
  .ref-card-tx{font-size:14px;color:var(--text);font-weight:600;line-height:1.4;}

  /* ============ MAIN APP (post-login) ============ */
  #appBgLayer{position:fixed;inset:0;max-width:440px;margin:0 auto;z-index:19;display:none;
    background-size:cover;background-position:center;background-repeat:no-repeat;pointer-events:none;}
  #appBgLayer.show{display:block;}
  #appBgLayer::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,var(--app-bg-dark,.55));}
  #appRoot{position:fixed;top:0;left:0;right:0;height:100dvh;max-width:440px;margin:0 auto;overflow:hidden;
    background:radial-gradient(120% 80% at 50% 0%, #161410 0%, #0d0d0c 40%, #080808 100%);
    display:none;flex-direction:column;z-index:20;}
  #appRoot.show{display:flex;}
  #appRoot.has-bg{background:transparent;}
  .app-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:16px 22px 100px;
    scrollbar-width:none;-ms-overflow-style:none;}
  .app-scroll::-webkit-scrollbar{display:none;width:0;height:0;}
  /* hide scrollbars on any scroll container in the app */
  #appRoot *::-webkit-scrollbar{display:none;width:0;height:0;}
  #appRoot *{scrollbar-width:none;-ms-overflow-style:none;}
  .app-h1{font-size:22px;font-weight:800;letter-spacing:-.02em;}
  .app-sub{color:var(--muted);font-size:14px;margin-top:4px;}
  .greet-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .avatar{width:44px;height:44px;border-radius:50%;background:var(--surface2);
    display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--yellow);font-size:18px;}
  .top-icons{display:flex;gap:10px;align-items:center;}
  .top-ic{width:40px;height:40px;border-radius:12px;background:var(--card-grad);
    border:1px solid var(--gold-line-soft);display:flex;align-items:center;justify-content:center;
    color:var(--yellow);cursor:pointer;transition:.12s;}
  .top-ic:active{transform:scale(.92);}

  /* ===== WALLET page ===== */
  .wallet-balance-card{background:var(--card-grad-gold);border:1px solid var(--gold-line);
    border-radius:18px;padding:20px;margin-top:16px;box-shadow:var(--gold-glow);}
  .wbc-label{font-size:12px;color:var(--muted);}
  .wbc-amt{font-size:32px;font-weight:800;margin-top:4px;}
  .wbc-foot{display:flex;justify-content:space-between;margin-top:20px;font-size:12px;color:var(--muted);}
  .wallet-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px;}
  .wa{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;}
  .wa-ic{min-width:54px;height:auto;border-radius:14px;background:transparent;border:none;
    display:flex;align-items:center;justify-content:center;color:var(--yellow);}
  .wa-ic img{object-fit:contain;}
  .wa:active .wa-ic{transform:scale(.92);}
  .wa-t{font-size:11px;font-weight:600;}
  .txn-list{margin-top:12px;}
  .txn-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line);}
  .txn-note{font-size:14px;font-weight:600;}
  .txn-date{font-size:11px;color:var(--muted);margin-top:2px;}
  .txn-amt{font-size:14px;font-weight:700;}
  .txn-amt.neg{color:#ff6b6b;} .txn-amt.pos{color:#51cf66;}

  /* ===== REWARDS page (premium yellow/black, Latest+Popular) ===== */
  .rewards-hero{margin:0 -22px 0;padding:0 22px 24px;
    background:
      radial-gradient(90% 70% at 50% -5%, rgba(245,197,24,.28) 0%, rgba(245,197,24,.06) 45%, transparent 70%),
      linear-gradient(180deg, #15130c 0%, #0c0b08 70%, #0a0a0a 100%);
    text-align:center;border-bottom:1px solid var(--gold-line);}
  .rewards-topbar{display:flex;align-items:center;justify-content:space-between;
    padding:calc(14px + env(safe-area-inset-top)) 0 8px;}
  .rewards-back{background:rgba(255,255,255,.06);border:1px solid var(--gold-line-soft);
    color:var(--yellow);width:34px;height:34px;border-radius:10px;font-size:22px;line-height:1;cursor:pointer;}
  .rewards-htitle{font-size:17px;font-weight:800;color:#fff;}
  .rewards-history{font-size:13px;font-weight:600;color:var(--yellow);cursor:pointer;}
  .rewards-coin{margin-top:6px;filter:drop-shadow(0 6px 18px rgba(245,197,24,.5));}
  .rewards-balance{font-size:38px;font-weight:900;margin-top:6px;
    background:linear-gradient(180deg,#fff,#F5C518);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .rewards-balance-label{font-size:12px;color:var(--muted);margin-top:0;}
  .rewards-my{margin:16px auto 0;background:#fff;color:#111;border:none;border-radius:24px;
    padding:10px 24px;font-size:14px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:8px;
    box-shadow:0 6px 20px -8px rgba(0,0,0,.6);}
  .rewards-my:active{transform:scale(.96);}
  .rwd-sec-head{display:flex;align-items:flex-end;justify-content:space-between;}
  .rwd-viewmore{font-size:13px;color:var(--yellow);font-weight:600;cursor:pointer;margin-bottom:2px;}
  .rwd-row{display:flex;gap:12px;overflow-x:auto;margin-top:12px;padding-bottom:4px;
    scrollbar-width:none;}
  .rwd-row::-webkit-scrollbar{display:none;}
  .rwd-card{min-width:150px;max-width:150px;cursor:pointer;transition:.12s;}
  .rwd-card.grid{min-width:0;max-width:none;}
  .rwd-card:active{transform:scale(.97);}
  .rwd-img{width:100%;aspect-ratio:1.4/1;border-radius:14px;background:#16140e;background-size:cover;
    background-position:center;display:flex;align-items:flex-start;justify-content:flex-start;font-size:30px;
    position:relative;border:1px solid var(--gold-line-soft);overflow:hidden;}
  .rwd-tag{position:absolute;top:8px;left:8px;font-size:9px;font-weight:800;color:#111;
    background:var(--yellow);border-radius:5px;padding:3px 7px;letter-spacing:.04em;}
  .rwd-name{font-size:13px;font-weight:700;margin-top:9px;line-height:1.3;}
  .rwd-cost{font-size:12px;font-weight:700;color:var(--yellow);margin-top:3px;}
  .rewards-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .rwd-empty{margin-top:12px;padding:28px 18px;text-align:center;border-radius:16px;
    border:1px dashed var(--gold-line-soft);background:rgba(0,0,0,.25);}
  .rwd-empty>div{font-size:15px;font-weight:700;margin-top:8px;}
  .rwd-empty>span{display:block;font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5;}

  /* ===== ORDER page ===== */
  .order-tabs{display:flex;gap:10px;margin-top:18px;}
  .order-tab{flex:1;text-align:center;padding:11px;border-radius:12px;background:var(--surface);
    border:1px solid var(--line);font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;}
  .order-tab.on{background:var(--yellow);color:#111;border-color:var(--yellow);}
  .order-card{background:var(--card-grad);border:1px solid var(--gold-line-soft);border-radius:14px;
    padding:16px;margin-top:12px;}
  .order-top{display:flex;justify-content:space-between;align-items:center;}
  .order-svc{font-size:16px;font-weight:700;}
  .order-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:capitalize;}
  .order-status.upcoming{background:rgba(245,197,24,.18);color:var(--yellow);}
  .order-status.completed{background:rgba(81,207,102,.18);color:#51cf66;}
  .order-status.cancelled{background:rgba(255,107,107,.18);color:#ff6b6b;}
  .order-meta{font-size:13px;color:var(--muted);margin-top:8px;}

  /* ===== ACCOUNT page ===== */
  .acc-head{display:flex;align-items:center;gap:14px;padding:calc(10px + env(safe-area-inset-top)) 0 4px;cursor:pointer;}
  .acc-avatar{width:58px;height:58px;border-radius:50%;background:var(--card-grad-gold);
    border:1px solid var(--gold-line);display:flex;align-items:center;justify-content:center;
    font-size:24px;font-weight:800;color:var(--yellow);overflow:hidden;}
  .acc-name{font-size:18px;font-weight:800;display:flex;align-items:center;gap:6px;}
  .acc-phone{font-size:13px;color:var(--muted);margin-top:2px;}
  .acc-upgrade{margin-top:16px;background:var(--card-grad-gold);border:1px solid var(--gold-line);
    border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
  .acc-upg-text{font-size:13px;font-weight:600;max-width:65%;}
  .acc-upg-btn{background:var(--yellow);color:#111;font-weight:800;font-size:13px;border-radius:20px;padding:7px 16px;}
  .acc-list{margin-top:10px;}
  .acc-row{display:flex;align-items:center;justify-content:space-between;padding:16px 2px;
    border-bottom:1px solid var(--line);cursor:pointer;}
  .acc-row:active{opacity:.6;}
  .acc-row-label{font-size:15px;font-weight:600;}
  .acc-row-right{display:flex;align-items:center;gap:8px;}
  .acc-row-val{font-size:14px;color:var(--muted);}
  .acc-chev{color:var(--muted);font-size:18px;}
  /* gender toggle */
  .gender-toggle{display:flex;gap:10px;}
  .gender-opt{padding:11px 22px;border-radius:22px;background:var(--surface);border:1px solid var(--line);
    font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;}
  .gender-opt.on{background:var(--yellow);color:#111;border-color:var(--yellow);font-weight:800;}
  /* maintenance */
  .maint-card{background:var(--card-grad);border:1px solid var(--gold-line-soft);border-radius:14px;padding:16px;margin-top:14px;}
  .maint-car{font-size:16px;font-weight:700;}
  .maint-row{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-top:10px;}
  .maint-val{color:var(--text);font-weight:700;}
  .btn-sm{height:auto;padding:9px 16px;font-size:13px;}
  .card-box{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:16px;}
  .wallet-card{background:linear-gradient(135deg,var(--yellow),var(--yellow-dim));color:#111;
    border:none;border-radius:20px;padding:20px;margin-top:18px;}
  .wallet-card .lbl{font-size:13px;font-weight:600;opacity:.8;}
  .wallet-card .amt{font-size:30px;font-weight:800;margin-top:4px;}
  .wallet-card .pts{font-size:13px;margin-top:8px;font-weight:600;}
  .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px;}
  .quick{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;
    display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:.12s;}
  .quick:active{transform:scale(.97);}
  .quick .ic{font-size:26px;}
  .quick .t{font-size:14px;font-weight:700;}
  .sec-title{font-size:15px;font-weight:800;margin-top:26px;padding-left:12px;position:relative;}
  .sec-title::before{content:"";position:absolute;left:0;top:3px;bottom:3px;width:3px;
    border-radius:3px;background:linear-gradient(var(--yellow),var(--yellow-dim));}
  .sec-title-row{display:flex;align-items:flex-end;justify-content:space-between;}
  .sec-title-row .sec-title{flex:1;}
  .see-all{background:none;border:none;color:var(--yellow);font-size:13px;font-weight:600;cursor:pointer;margin-top:26px;}
  .svc-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;
    overflow:hidden;margin-top:12px;cursor:pointer;transition:.12s;}
  .svc-card:active{transform:scale(.99);}
  .svc-card .img{width:100%;height:130px;object-fit:cover;background:var(--surface2);}
  .svc-card .body{padding:14px;}
  .svc-card .cat{font-size:11px;color:var(--yellow);text-transform:uppercase;letter-spacing:.06em;font-weight:700;}
  .svc-card .nm{font-size:16px;font-weight:700;margin-top:3px;}
  .svc-card .ds{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.4;}
  .svc-card .pr{font-size:15px;font-weight:800;margin-top:8px;color:var(--text);}
  /* package cards (category list, 2-col like reference) */
  .pkg-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 12px;margin-top:8px;}
  .pkg-card{cursor:pointer;transition:.12s;}
  .pkg-card:active{transform:scale(.97);}
  .pkg-img{position:relative;width:100%;aspect-ratio:1/1;border-radius:12px;overflow:hidden;background:var(--surface2);}
  .pkg-img img{width:100%;height:100%;object-fit:cover;}
  .pkg-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted);background:#cfcfcf;}
  .pkg-badge{position:absolute;top:8px;left:8px;background:var(--yellow);color:#080808;font-size:10px;font-weight:800;
    padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em;}
  .pkg-nm{font-size:13.5px;font-weight:700;margin-top:8px;line-height:1.3;}
  .pkg-from{font-size:11px;color:var(--muted);margin-top:6px;}
  .pkg-price{font-size:15px;font-weight:800;color:var(--text);}
  /* category grid — logo/icon only, no square box */
  .cat-grid{margin-top:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px 10px;}
  .cat-card{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:.12s;}
  .cat-card:active{transform:scale(.95);}
  .cat-card .cat-img{width:62px;height:62px;border-radius:14px;object-fit:cover;}
  .cat-card .cat-ico{width:62px;height:62px;display:flex;align-items:center;justify-content:center;font-size:38px;line-height:1;}
  .cat-card .cat-nm{font-size:12.5px;font-weight:600;text-align:center;line-height:1.2;}
  .cat-card .cat-ct{display:none;}
  .cat-card .cat-arrow{display:none;}
  /* special service tiles (Mystery Box, Warranty) */
  .svc-special-grid{margin-top:8px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  .svc-special{display:flex;align-items:center;gap:10px;border-radius:16px;padding:14px;cursor:pointer;
    background:var(--card-grad);border:1px solid var(--gold-line-soft);transition:.12s;}
  .svc-special:active{transform:scale(.97);}
  .svc-special .sp-ic{font-size:26px;flex:0 0 auto;}
  .svc-special .sp-nm{font-size:13px;font-weight:700;line-height:1.2;}
  /* service detail */
  .sd-gallery{position:relative;width:100%;height:230px;background:var(--surface2);overflow-x:auto;
    display:flex;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
  .sd-gallery::-webkit-scrollbar{display:none;}
  .sd-slide{flex:0 0 100%;width:100%;height:230px;object-fit:cover;scroll-snap-align:start;}
  .sd-slide.sd-empty{display:flex;align-items:center;justify-content:center;font-size:64px;background:var(--card-grad);}
  .sd-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:6px;}
  .sd-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);}
  .sd-dot.on{background:var(--yellow);}
  .sd-title-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .sd-price-tag{color:var(--yellow);font-size:20px;font-weight:800;white-space:nowrap;}
  .sd-badge{display:inline-block;margin-top:8px;background:var(--surface2);border:1px solid var(--line);
    border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text);}
  .sd-sec-t{font-size:15px;font-weight:700;color:var(--yellow);margin:22px 0 10px;}
  .sd-sub{font-size:12px;color:var(--muted);margin:-6px 0 10px;}
  .sd-vari{display:flex;flex-wrap:wrap;gap:8px;}
  .sd-chip{background:var(--surface);border:1px solid var(--line);color:var(--text);
    border-radius:20px;padding:8px 16px;font-size:13px;cursor:pointer;transition:.12s;}
  .sd-chip.on{background:var(--yellow);color:#080808;border-color:var(--yellow);font-weight:700;}
  .sd-chip.locked{cursor:default;opacity:1;}
  .sd-vari-note{font-size:11.5px;color:var(--muted);margin-top:6px;}
  .sd-row{display:flex;align-items:center;justify-content:space-between;margin-top:22px;}
  .sd-qty{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:6px 12px;}
  .sd-qty button{background:none;border:none;color:var(--text);font-size:20px;width:26px;cursor:pointer;}
  .sd-qty span{min-width:18px;text-align:center;font-weight:700;}
  .sd-addon{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:10px 12px;margin-bottom:10px;cursor:pointer;}
  .sd-addon img{width:42px;height:42px;border-radius:8px;object-fit:cover;flex:0 0 auto;}
  .sd-addon-ic{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    background:var(--surface2);font-size:20px;color:var(--muted);flex:0 0 auto;}
  .sd-addon-nm{flex:1;font-size:13px;font-weight:600;line-height:1.3;}
  .sd-addon-pr{color:var(--yellow);font-weight:700;font-size:14px;white-space:nowrap;}
  .sd-addon input{width:20px;height:20px;accent-color:var(--yellow);flex:0 0 auto;}
  .sd-stores{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;}
  .sd-stores::-webkit-scrollbar{display:none;}
  .sd-store{flex:0 0 110px;cursor:pointer;}
  .sd-store img,.sd-store-ph{width:110px;height:80px;border-radius:12px;object-fit:cover;background:var(--surface2);
    display:flex;align-items:center;justify-content:center;font-size:30px;border:2px solid transparent;}
  .sd-store.on img,.sd-store.on .sd-store-ph{border-color:var(--yellow);}
  .sd-store-nm{font-size:12px;font-weight:600;margin-top:6px;text-align:center;line-height:1.2;}
  .sd-info{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 16px;
    font-size:13.5px;line-height:1.55;color:var(--text);}
  .sd-info-list{list-style:none;margin:0;padding:0;}
  .sd-info-list li{position:relative;padding-left:18px;margin-bottom:9px;color:var(--text);}
  .sd-info-list li:last-child{margin-bottom:0;}
  .sd-info-list li::before{content:'';position:absolute;left:2px;top:8px;width:5px;height:5px;border-radius:50%;background:var(--yellow);}
  .sd-info-time{margin-top:12px;padding-top:10px;border-top:1px solid var(--line);color:var(--muted);font-size:12.5px;}
  .sd-checkout-bar{position:absolute;bottom:0;left:0;right:0;padding:14px 18px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,var(--bg) 60%,transparent);}
  .sd-bar-row{display:flex;gap:10px;}
  .sd-buy{flex:1;min-width:0;}
  .sd-action{flex:1;min-width:0;background:#ff4d2e !important;color:#fff !important;border:none;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;font-size:14px;}
  .sd-action.claimed{background:var(--surface2) !important;color:var(--muted) !important;cursor:not-allowed;}
  .sd-action.voucher{background:#2e7d32 !important;color:#fff !important;}
  /* select a car */
  .sd-cars{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;}
  .sd-cars::-webkit-scrollbar{display:none;}
  .sd-car{flex:0 0 auto;display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--line);
    border-radius:14px;padding:10px 14px;cursor:pointer;color:var(--text);min-width:150px;}
  .sd-car.on{border-color:var(--yellow);background:var(--surface2);}
  .sd-car-ic{font-size:22px;}
  .sd-car-nm{font-size:14px;font-weight:700;text-align:left;}
  .sd-car-sub{font-size:11px;color:var(--muted);text-align:left;}
  .sd-car-empty{background:var(--surface);border:1.5px dashed var(--gold-line-soft);border-radius:14px;
    padding:16px;text-align:center;color:var(--yellow);font-weight:600;cursor:pointer;}
  /* mystery box */
  .mb-top{background:linear-gradient(135deg,#1f7a6e,#2e9e8c);border-bottom:none;color:#fff;}
  .mb-top .back,.mb-top .ttl,.mb-top .home-btn{color:#fff;}
  .mb-scroll{background:linear-gradient(180deg,#2e9e8c 0%,#3fb89f 30%,#eafaf4 60%);}
  .mb-hero{text-align:center;padding:24px 0 18px;}
  .mb-box{font-size:96px;line-height:1;cursor:pointer;transition:.15s;filter:drop-shadow(0 8px 20px rgba(0,0,0,.25));}
  .mb-box:active{transform:scale(.92) rotate(-3deg);}
  .mb-open{margin-top:8px;background:#0d4d44;color:#fff;border:none;border-radius:20px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;}
  .mb-remain{margin-top:14px;display:inline-block;background:#fff;color:#0d4d44;border-radius:20px;padding:8px 22px;font-weight:700;font-size:14px;}
  .mb-card{background:#fff;border-radius:16px;padding:16px;margin-top:14px;box-shadow:0 4px 14px rgba(0,0,0,.06);}
  .mb-card-t{font-size:15px;font-weight:800;color:#0d4d44;margin-bottom:12px;}
  .mb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .mb-prize{background:#f4faf8;border:1px solid #d9efe9;border-radius:12px;padding:12px 6px;text-align:center;}
  .mb-prize-ic{font-size:26px;}
  .mb-prize-nm{font-size:11px;color:#23534b;margin-top:6px;line-height:1.2;font-weight:600;}
  .mb-rules{font-size:13px;color:#2c5d54;line-height:1.55;white-space:pre-wrap;}
  .mb-won{display:flex;justify-content:space-between;font-size:13px;color:#0d4d44;padding:8px 0;border-bottom:1px solid #eef5f3;}
  .mb-won span{color:#7aa49b;font-size:12px;}
  .mb-empty{background:#f4faf8;border-radius:10px;padding:14px;text-align:center;color:#7aa49b;font-size:13px;}
  /* bottom nav */
  .botnav{display:flex;border-top:1px solid var(--line);flex-shrink:0;
    background:linear-gradient(180deg,#0e0e0c,#0a0a0a);
    padding-bottom:env(safe-area-inset-bottom);
    border-radius:0;}
  .botnav button{flex:1;background:none;border:none;color:var(--muted);padding:10px 0;
    display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;font-size:10px;font-weight:600;}
  .botnav button.on{color:var(--yellow);}
  .botnav .ic{display:flex;align-items:center;justify-content:center;height:22px;}
  .botnav button.on .ic svg{filter:drop-shadow(0 0 6px rgba(245,197,24,.5));}
  .field{margin-top:16px;}
  .veh-kind-toggle{display:flex;gap:8px;margin-bottom:14px;}
  .vk-btn{flex:1;height:46px;background:var(--surface);border:1.5px solid var(--line);border-radius:14px;
    color:var(--text);font-size:15px;font-weight:600;cursor:pointer;transition:.12s;}
  .vk-btn.on{background:var(--yellow);color:#080808;border-color:var(--yellow);font-weight:700;}
  .veh-type-tag{margin-top:12px;display:inline-block;background:var(--surface2);border:1px solid var(--gold-line-soft);
    border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--yellow);}
  /* login popup carousel */
  .popup-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
  .popup-box{position:relative;width:100%;max-width:360px;max-height:88vh;background:var(--surface);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;}
  .popup-x{position:absolute;top:8px;right:8px;z-index:5;width:32px;height:32px;border-radius:50%;border:none;
    background:rgba(0,0,0,.55);color:#fff;font-size:15px;cursor:pointer;}
  .popup-track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;flex:1;min-height:0;}
  .popup-track::-webkit-scrollbar{display:none;}
  .popup-slide{flex:0 0 100%;scroll-snap-align:start;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .popup-slide img{width:100%;height:100%;object-fit:contain;display:block;}
  .popup-dots{display:flex;justify-content:center;gap:6px;padding:10px 0 2px;flex:0 0 auto;}
  .popup-dot{width:7px;height:7px;border-radius:50%;background:var(--line);}
  .popup-dot.on{background:var(--yellow);}
  .popup-dismiss{display:flex;align-items:center;gap:8px;justify-content:center;padding:12px;font-size:13px;color:var(--muted);cursor:pointer;flex:0 0 auto;}
  .popup-dismiss input{width:16px;height:16px;accent-color:var(--yellow);}
  /* brand tiles (category → brand → items) */
  .brand-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .brand-tile{background:var(--surface);border:1px solid var(--gold-line-soft);border-radius:16px;overflow:hidden;cursor:pointer;}
  .brand-tile:active{transform:scale(.98);}
  .brand-tile-img{width:100%;aspect-ratio:16/10;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .brand-tile-img img{width:100%;height:100%;object-fit:cover;}
  .brand-tile-ph{font-size:16px;font-weight:800;color:var(--muted);text-align:center;padding:8px;}
  .brand-tile-nm{padding:10px 12px;font-size:14px;font-weight:700;text-align:center;}
  .brand-tile-warr{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--yellow);margin-top:5px;
    background:rgba(245,197,24,.1);padding:3px 9px;border-radius:20px;}
  .brand-tile-warr .warr-ic{flex:0 0 auto;}
  .brand-warr-banner{display:inline-flex;align-items:center;gap:7px;background:rgba(245,197,24,.1);border:1px solid var(--gold-line-soft);color:var(--yellow);
    font-size:13px;font-weight:700;border-radius:20px;padding:8px 16px;margin-bottom:6px;}
  .sd-warr{display:inline-flex;align-items:center;gap:6px;background:rgba(245,197,24,.1);color:var(--yellow);font-size:12.5px;font-weight:700;
    border-radius:20px;padding:6px 14px;margin-top:8px;}
  /* ===== festival theme ===== */
  .fest-layer{position:fixed;inset:0;pointer-events:none;z-index:90;overflow:hidden;}
  .fest-piece{position:absolute;top:-40px;will-change:transform;animation:festFall linear infinite;}
  @keyframes festFall{
    0%{transform:translateY(-40px) translateX(0) rotate(0deg);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(105vh) translateX(var(--drift,20px)) rotate(var(--spin,360deg));opacity:.9;}
  }
  /* intro overlay */
  .fest-intro{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 40%, var(--festbg2,#1a0a0a) 0%, #050505 100%);
    transition:opacity .6s;overflow:hidden;}
  .fest-intro.hide{opacity:0;}
  .fest-intro-greet{font-size:30px;font-weight:800;text-align:center;padding:0 30px;z-index:2;
    background:linear-gradient(90deg,var(--festac,#F5C518),var(--festac2,#fff));-webkit-background-clip:text;background-clip:text;color:transparent;
    animation:festPop .8s var(--ease) both;}
  .fest-intro-sub{margin-top:10px;color:#fff;opacity:.7;font-size:14px;z-index:2;animation:festPop 1s .2s var(--ease) both;}
  .fest-mute{position:absolute;top:calc(16px + env(safe-area-inset-top));right:18px;z-index:3;background:rgba(255,255,255,.12);
    border:none;color:#fff;border-radius:20px;padding:8px 14px;font-size:13px;cursor:pointer;}
  @keyframes festPop{0%{transform:scale(.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
  /* greeting banner on home */
  .fest-banner{background:linear-gradient(90deg,var(--festac,#E63329),var(--festac2,#FFD24D));
    color:#fff;border-radius:14px;padding:12px 16px;margin:0 0 14px;font-weight:800;font-size:15px;text-align:center;
    text-shadow:0 1px 2px rgba(0,0,0,.25);box-shadow:0 6px 20px -10px rgba(0,0,0,.6);}
  /* ===== account sub-pages ===== */
  .acc-check{color:var(--yellow);font-weight:800;font-size:16px;}
  .tg{width:44px;height:26px;border-radius:14px;background:var(--surface2);border:1px solid var(--line);position:relative;transition:.15s;}
  .tg.on{background:var(--yellow);border-color:var(--yellow);}
  .tg-dot{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.15s;}
  .tg.on .tg-dot{left:20px;}
  .settings-note{font-size:11.5px;color:var(--muted);margin-top:14px;line-height:1.5;}
  .fb-label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px;}
  .fb-input{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;font-family:inherit;}
  .fb-photos{display:flex;flex-wrap:wrap;gap:8px;}
  .fb-thumb{position:relative;width:64px;height:64px;border-radius:10px;overflow:hidden;}
  .fb-thumb img{width:100%;height:100%;object-fit:cover;}
  .fb-thumb-x{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .sup-list,.sup-row{display:flex;}
  .sup-list{flex-direction:column;gap:10px;}
  .sup-row{align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px;cursor:pointer;transition:.12s;}
  .sup-row:active{transform:scale(.99);}
  .sup-ic{font-size:22px;flex:0 0 auto;}
  .sup-nm{font-size:15px;font-weight:700;}
  .sup-sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .policy-body{font-size:14px;line-height:1.65;color:var(--text);}
  .policy-body p{margin:0 0 13px;}
  .policy-body b{color:var(--text);}
  .pol-note{font-size:12px;color:var(--muted);font-style:italic;margin-top:18px;}
  .about-wrap{text-align:center;padding:20px 0;}
  .about-logo{font-size:26px;font-weight:900;letter-spacing:.08em;color:var(--yellow);}
  .about-tag{font-size:13px;color:var(--muted);margin-top:6px;}
  .about-ver{font-size:12px;color:var(--muted);margin-top:14px;}
  .about-foot{text-align:center;font-size:11.5px;color:var(--muted);line-height:1.7;margin-top:24px;}
  /* light theme */
  html[data-theme="light"]{
    --bg:#F5F5F7; --surface:#FFFFFF; --surface2:#EFEFF2; --text:#111; --muted:#6B6B70;
    --line:#E2E2E6;
  }
  /* ===== wallet top-up + gift ===== */
  .tu-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .tu-tile{background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;transition:.12s;}
  .tu-tile.on{border-color:var(--yellow);background:rgba(245,197,24,.08);}
  .tu-amt{font-size:16px;font-weight:800;}
  .tu-bonus{font-size:11px;color:var(--yellow);font-weight:700;margin-top:3px;}
  .tu-pay{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;}
  .tu-pay.on{border-color:var(--yellow);}
  .tu-pay-nm{font-size:14.5px;font-weight:700;}
  .tu-pay-sub{font-size:12px;color:var(--yellow);margin-top:2px;}
  .tu-radio{font-size:18px;color:var(--yellow);}
  .tu-summary{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-top:16px;}
  .tu-sum-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px;color:var(--muted);}
  .tu-sum-bonus{color:var(--yellow);font-weight:700;}
  .tu-sum-total{margin-bottom:0;padding-top:8px;border-top:1px solid var(--line);color:var(--text);font-weight:800;font-size:16px;}
  .gc-card{background:linear-gradient(135deg,#1a1a1a,#2a2410);border:1px solid var(--gold-line);border-radius:18px;padding:24px;text-align:center;}
  .gc-card-label{font-size:12px;letter-spacing:.15em;color:var(--yellow);font-weight:700;}
  .gc-card-amt{font-size:34px;font-weight:900;margin-top:8px;color:#fff;}
  /* ===== my cars / car detail ===== */
  .mycar-card{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:.12s;}
  .mycar-card:active{transform:scale(.99);}
  .mycar-left{display:flex;align-items:center;gap:12px;min-width:0;}
  .veh-logo-ph{font-size:22px;}
  .mycar-name{font-size:15px;font-weight:700;}
  .mycar-plate{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .mycar-right{display:flex;align-items:center;gap:8px;flex:0 0 auto;}
  .mycar-badge{background:rgba(245,197,24,.14);color:var(--yellow);font-size:11px;font-weight:700;padding:4px 9px;border-radius:12px;}
  .cd-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .cd-plate{font-size:15px;font-weight:800;letter-spacing:.04em;}
  .cd-type{font-size:11px;background:var(--surface2);color:var(--muted);padding:3px 10px;border-radius:10px;}
  .cd-tabs{display:flex;gap:8px;}
  .cd-tab{flex:1;height:42px;background:var(--surface);border:1px solid var(--line);border-radius:12px;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;}
  .cd-tab.on{background:var(--yellow);color:#080808;border-color:var(--yellow);font-weight:700;}
  .hist-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;}
  .hist-top{display:flex;justify-content:space-between;align-items:baseline;}
  .hist-svc{font-size:14.5px;font-weight:700;}
  .hist-date{font-size:12px;color:var(--muted);}
  .hist-remark{font-size:13px;color:var(--text);margin-top:8px;line-height:1.5;background:var(--surface2);border-radius:10px;padding:9px 11px;}
  .hist-remark-label{color:var(--yellow);font-weight:700;}
  .hist-next{font-size:12.5px;color:var(--muted);margin-top:8px;}
  .hist-txn{display:flex;justify-content:space-between;font-size:13px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);color:var(--muted);}
  .hist-amt{font-weight:700;color:var(--text);}
  .hist-invoice{margin-top:10px;width:100%;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;}
  /* ===== google reviews ===== */
  .rv-google{font-size:13px;font-weight:700;color:#4285F4;}
  .rv-card{min-width:82vw;max-width:82vw;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;margin-right:12px;box-sizing:border-box;}
  .rv-stars{color:#FFC107;font-size:16px;letter-spacing:1px;}
  .rv-stars-dim{color:var(--line);}
  .rv-text{font-size:14px;line-height:1.55;margin:10px 0 14px;color:var(--text);}
  .rv-author{display:flex;align-items:center;gap:10px;}
  .rv-avatar{width:36px;height:36px;border-radius:50%;background:var(--yellow);color:#080808;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;}
  .rv-name{font-size:13.5px;font-weight:700;}
  .rv-meta{font-size:11.5px;color:var(--muted);}
  /* ===== social row ===== */
  .social-reward{background:rgba(245,197,24,.12);color:var(--yellow);font-size:12.5px;font-weight:600;border-radius:10px;padding:8px 12px;margin-bottom:10px;}
  .social-row{display:flex;gap:10px;}
  .social-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 6px;text-decoration:none;color:var(--text);font-size:12.5px;font-weight:600;transition:.12s;}
  .social-btn:active{transform:scale(.97);}
  .social-ic{font-size:22px;}
  .social-share-btn{width:100%;margin-top:10px;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:11px;font-size:13.5px;font-weight:600;cursor:pointer;}
  /* ===== booking calendar + slots ===== */
  .bk-section-label{display:block;font-size:13px;font-weight:700;margin:18px 0 10px;}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .cal-month{font-size:15px;font-weight:700;}
  .cal-nav{width:36px;height:36px;border-radius:10px;background:var(--surface);border:1px solid var(--line);color:var(--text);font-size:18px;cursor:pointer;}
  .cal-nav:disabled{opacity:.3;cursor:default;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .cal-dow{text-align:center;font-size:11px;color:var(--muted);font-weight:700;padding:4px 0;}
  .cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative;border-radius:10px;font-size:14px;
    background:var(--surface);border:1px solid var(--line);cursor:pointer;transition:.1s;}
  .cal-day:active{transform:scale(.94);}
  .cal-day.off{opacity:.28;cursor:default;background:transparent;border-color:transparent;}
  .cal-day.sel{background:var(--yellow);color:#080808;border-color:var(--yellow);font-weight:800;}
  .cal-day.closed{border-color:#5a2020;color:#b06;}
  .cal-x{position:absolute;font-size:9px;bottom:3px;color:#E5533C;}
  .slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .slot{background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:.1s;}
  .slot:active{transform:scale(.97);}
  .slot.sel{background:var(--yellow);border-color:var(--yellow);}
  .slot.sel .slot-time,.slot.sel .slot-left{color:#080808;}
  .slot.full{opacity:.4;cursor:default;background:var(--surface2);}
  .slot-time{font-size:14px;font-weight:700;}
  .slot-left{font-size:11px;color:var(--muted);margin-top:2px;}
  .slot.full .slot-left{color:#E5533C;}
  .bk-slots-hint{font-size:13px;color:var(--muted);padding:8px 0;}
  /* ===== order maintenance reminders ===== */
  .maint-reminder{background:linear-gradient(135deg,rgba(245,197,24,.12),rgba(245,197,24,.04));border:1px solid var(--gold-line);border-radius:14px;padding:14px;margin-bottom:10px;}
  .maint-rem-top{display:flex;gap:12px;align-items:flex-start;}
  .maint-rem-ic{font-size:20px;}
  .maint-rem-title{font-size:14.5px;font-weight:700;}
  .maint-rem-sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .maint-rem-btn{margin-top:12px;width:100%;background:var(--yellow);color:#080808;border:none;border-radius:11px;padding:11px;font-size:13.5px;font-weight:700;cursor:pointer;}
  .order-cancel{margin-top:12px;width:100%;background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:9px;font-size:13px;cursor:pointer;}
  /* ===== vouchers ===== */
  .vch-card{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;}
  .vch-card.done{opacity:.55;}
  .vch-left{display:flex;align-items:center;gap:12px;}
  .vch-ic{font-size:22px;}
  .vch-name{font-size:14.5px;font-weight:700;}
  .vch-meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .vch-show{background:var(--yellow);color:#080808;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;}
  .vch-used{color:var(--yellow);font-size:18px;font-weight:800;}
  /* ===== earn points info ===== */
  .earn-info{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;margin:16px 16px 0;}
  .earn-title{font-size:14px;font-weight:800;margin-bottom:10px;}
  .earn-row{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--text);padding:6px 0;}
  .earn-ic{font-size:17px;}
  /* payment sheet */
  .pay-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;
    opacity:0;transition:opacity .2s;}
  .pay-sheet-overlay.show{opacity:1;}
  .pay-sheet{width:100%;background:var(--bg);border-radius:22px 22px 0 0;padding:10px 18px calc(22px + env(safe-area-inset-bottom));
    border-top:1px solid var(--gold-line-soft);transform:translateY(100%);transition:transform .22s;}
  .pay-sheet-overlay.show .pay-sheet{transform:translateY(0);}
  .pay-sheet-handle{width:40px;height:4px;background:var(--line);border-radius:3px;margin:6px auto 14px;}
  .pay-sheet-title{font-size:18px;font-weight:800;}
  .pay-sheet-amt{font-size:14px;color:var(--yellow);font-weight:700;margin:4px 0 16px;}
  .pay-opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--surface);
    border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:10px;cursor:pointer;transition:.12s;}
  .pay-opt:active{transform:scale(.99);} .pay-opt:hover{border-color:var(--gold-line);}
  .pay-opt-ic{font-size:24px;flex:0 0 auto;}
  .pay-opt-nm{font-size:15px;font-weight:700;}
  .pay-opt-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .pay-cancel{width:100%;background:none;border:none;color:var(--muted);font-size:14px;padding:12px;margin-top:4px;cursor:pointer;}
  /* referral page */
  .help-btn{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;
    border:1px solid var(--line);background:var(--surface);color:var(--muted);font-size:15px;font-weight:700;cursor:pointer;}
  .ref-head{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
  .ref-avatar{width:54px;height:54px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;}
  .ref-avatar img{width:100%;height:100%;object-fit:cover;}
  .ref-name{font-size:17px;font-weight:700;}
  .ref-code-row{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .ref-code-row b{color:var(--yellow);letter-spacing:1px;}
  .ref-copy{cursor:pointer;margin-left:6px;}
  .ref-earn-t{font-size:16px;font-weight:800;margin-bottom:12px;}
  .ref-check{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--muted);padding:7px 0;}
  .ref-check.on{color:var(--text);}
  .ref-tick{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--surface2);color:var(--muted);flex:0 0 auto;}
  .ref-check.on .ref-tick{background:var(--yellow);color:#080808;font-weight:800;}
  .ref-invite-row{display:flex;justify-content:space-between;font-size:13.5px;font-weight:600;margin-top:14px;margin-bottom:8px;}
  .ref-bar{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;}
  .ref-bar-fill{height:100%;background:var(--yellow);border-radius:4px;transition:width .3s;}
  .ref-actions{display:flex;gap:12px;align-items:center;margin-top:18px;}
  .ref-share{flex:1;}
  .ref-qr-btn{width:58px;height:58px;border-radius:50%;border:none;background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .ref-list-t{font-size:16px;font-weight:800;margin-top:26px;}
  .ref-list-hint{font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:12px;line-height:1.4;}
  .ref-friend{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
  .ref-friend-av{width:38px;height:38px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto;}
  .ref-friend-nm{flex:1;font-size:14px;font-weight:600;}
  .ref-friend-status{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:10px;}
  .ref-friend-status.joined{background:#bff0e4;color:#0d4d44;}
  .ref-friend-status.pending{background:var(--surface2);color:var(--muted);}
  .ref-empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 0;}
  .ref-terms{margin:10px 0 4px;padding-left:20px;}
  .ref-terms li{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:8px;}
  /* my packages */
  .pkg-veh-h{font-size:13px;font-weight:700;color:var(--muted);margin:20px 0 8px;}
  .pkg-bal-card{background:var(--surface);border:1px solid var(--gold-line-soft);border-radius:16px;padding:16px;margin-bottom:14px;}
  .pkg-bal-card.done{opacity:.6;}
  .pkg-bal-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .pkg-bal-name{font-size:15.5px;font-weight:700;}
  .pkg-bal-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .pkg-bal-count{text-align:right;white-space:nowrap;}
  .pkg-rem{font-size:24px;font-weight:800;color:var(--yellow);}
  .pkg-rem-of{font-size:12px;color:var(--muted);margin-left:4px;}
  .pkg-done-tag{font-size:12px;font-weight:700;color:#0d4d44;background:#bff0e4;padding:3px 10px;border-radius:10px;}
  .pkg-bar{height:6px;background:var(--surface2);border-radius:4px;margin-top:12px;overflow:hidden;}
  .pkg-bar-fill{height:100%;background:var(--yellow);border-radius:4px;transition:width .3s;}
  .pkg-barcode{background:#fff;border-radius:10px;padding:12px 14px 6px;margin-top:14px;}
  .pkg-barcode-num{text-align:center;font-size:12px;letter-spacing:2px;color:var(--text);margin-top:6px;font-variant-numeric:tabular-nums;}
  .pkg-barcode-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:4px;}
  .pkg-history-btn{width:100%;margin-top:12px;background:none;border:none;color:var(--yellow);font-size:13px;font-weight:600;cursor:pointer;padding:6px;text-align:right;}
  .redeem-row{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid var(--line);}
  .redeem-ic{width:30px;height:30px;border-radius:50%;background:#bff0e4;color:#0d4d44;display:flex;align-items:center;justify-content:center;font-weight:800;flex:0 0 auto;}
  .redeem-title{font-size:14px;font-weight:600;}
  .redeem-date{font-size:12px;color:var(--muted);margin-top:2px;}
  /* milestone rewards */
  .ms-wrap{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;}
  .ms-title{font-size:13px;font-weight:700;margin-bottom:10px;}
  .ms-item{display:flex;align-items:center;gap:12px;padding:10px 0;}
  .ms-badge{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex:0 0 auto;}
  .ms-item.locked .ms-badge{background:var(--surface2);color:var(--muted);}
  .ms-item.unlocked .ms-badge{background:var(--yellow);color:#080808;}
  .ms-item.redeemed .ms-badge{background:#bff0e4;color:#0d4d44;}
  .ms-item.locked{opacity:.55;}
  .ms-body{flex:1;min-width:0;}
  .ms-label{font-size:14px;font-weight:600;}
  .ms-sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .ms-show-btn{flex:0 0 auto;background:var(--yellow);color:#080808;border:none;border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;}
  /* flash deals */
  .flash-strip{display:flex;gap:12px;overflow-x:auto;margin-top:12px;padding-bottom:4px;}
  .flash-strip::-webkit-scrollbar{display:none;}
  .flash-card{flex:0 0 168px;background:var(--surface);border:1px solid var(--gold-line-soft);border-radius:14px;overflow:hidden;cursor:pointer;transition:.12s;}
  .flash-card:active{transform:scale(.97);}
  .flash-img{position:relative;width:100%;height:110px;background:var(--surface2);}
  .flash-img img{width:100%;height:100%;object-fit:cover;}
  .flash-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:34px;}
  .flash-disc{position:absolute;top:8px;left:8px;background:#ff2e63;color:#fff;font-size:12px;font-weight:800;padding:3px 8px;border-radius:6px;}
  .flash-body{padding:10px 12px 12px;}
  .flash-nm{font-size:13.5px;font-weight:700;line-height:1.3;min-height:35px;}
  .flash-price{margin-top:4px;display:flex;align-items:baseline;gap:6px;}
  .flash-now{color:var(--yellow);font-weight:800;font-size:15px;}
  .flash-orig{color:var(--muted);font-size:12px;text-decoration:line-through;}
  .flash-meta{margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .flash-timer{background:#2a0d0d;color:#ff6b6b;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;font-variant-numeric:tabular-nums;}
  .flash-left{font-size:11px;color:var(--muted);font-weight:600;}
  .field label{font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;}
  .field input{width:100%;height:52px;background:var(--surface);border:1.5px solid var(--line);
    border-radius:14px;padding:0 16px;color:var(--text);font-size:16px;outline:none;}
  .field input:focus{border-color:var(--yellow);}
  .field input:disabled{opacity:.6;}
  .topbar-app{display:flex;align-items:center;gap:12px;padding:calc(14px + env(safe-area-inset-top)) 18px 14px;
    border-bottom:1px solid var(--line);}
  .topbar-app .back{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;}
  .topbar-app .ttl{font-size:18px;font-weight:700;}
  .topbar-app .home-btn{margin-left:auto;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}
  .guest-banner{background:var(--surface2);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-top:16px;font-size:13px;color:var(--muted);}
  .guest-banner b{color:var(--yellow);cursor:pointer;}

  /* ===== HOME PAGE rich sections ===== */
  .member-card{background:var(--card-grad-gold);border:1px solid var(--gold-line);
    border-radius:18px;padding:16px;margin-top:16px;box-shadow:var(--gold-glow);}
  .member-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .member-stats{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .member-stat{}
  .ms-label{font-size:12px;color:var(--muted);}
  .ms-value{font-size:20px;font-weight:800;margin-top:2px;}
  .checkin-box{background:var(--card-grad);border:1px solid var(--gold-line-soft);
    border-radius:16px;padding:18px 14px;margin-top:12px;}
  .ci-row{display:flex;justify-content:space-between;gap:4px;}
  .ci-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .ci-reward{font-size:9px;color:var(--muted);font-weight:600;text-align:center;min-height:11px;}
  .ci-icon{font-size:22px;filter:grayscale(1) opacity(.35);transition:.2s;line-height:1;}
  .ci-icon.on{filter:none;transform:scale(1.05);}
  .ci-gift{font-size:24px;}
  .ci-daylabel{font-size:9px;color:var(--muted);}
  .ci-btn{margin-top:16px;}

function vapidToUint8(base64){
  const pad='='.repeat((4-base64.length%4)%4);
  const b=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(b); const arr=new Uint8Array(raw.length);

/* asks permission (must be a user tap on iOS), saves this device's subscription to gl_push_subs */
async function enablePush(){
  try{
    if(VAPID_PUBLIC.indexOf('PASTE_')===0) return false;
    if(!('serviceWorker' in navigator) || !('PushManager' in window)) return false;
    if(!(typeof SESSION!=='undefined' && SESSION && SESSION.user)) return false;
    if(Notification.permission === 'denied') return false;
    const perm = await Notification.requestPermission();
    if(perm !== 'granted') return false;
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if(!sub){
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: vapidToUint8(VAPID_PUBLIC)
      });
    }
    const id = 'ps' + Math.abs(sub.endpoint.split('').reduce((a,c)=>((a<<5)-a+c.charCodeAt(0))|0,0));
    const resp = await fetch(`${SUPA_URL}/rest/v1/gl_push_subs`, {
      method:'POST',
      headers: Object.assign({}, authHeaders(), { Prefer:'resolution=merge-duplicates' }),
      body: JSON.stringify({ id, owner_id: SESSION.user.id, sub: JSON.parse(JSON.stringify(sub)), updated_at: new Date().toISOString() })
    });
    if(!resp.ok){ console.error('push sub save failed', resp.status, await resp.text()); return false; }
    return true;
  }catch(e){ console.warn('push setup failed', e); return false; }
}

  cny:       { name:'Chinese New Year', greet:'Gong Xi Fa Cai 🧧', accent:'#E63329', accent2:'#FFD24D', deco:'lantern',
               dates:{2026:'2026-02-17',2027:'2027-02-06',2028:'2028-01-26',2029:'2029-02-13',2030:'2030-02-03'} },

               dates:{2026:'2026-05-27',2027:'2027-05-17',2028:'2028-05-05',2029:'2029-04-24',2030:'2030-04-14'} },

               dates:{2026:'2026-11-08',2027:'2027-10-29',2028:'2028-11-15',2029:'2029-11-05',2030:'2030-10-26'} },

               dates:{2026:'2026-08-31',2027:'2027-08-31',2028:'2028-08-31',2029:'2029-08-31',2030:'2030-08-31'} },
  christmas: { name:'Christmas', greet:'Merry Christmas 🎄', accent:'#D32F2F', accent2:'#2E7D32', deco:'snow',
               dates:{2026:'2026-12-25',2027:'2027-12-25',2028:'2028-12-25',2029:'2029-12-25',2030:'2030-12-25'} },
};
const FEST_BEFORE=15, FEST_AFTER=10;
function activeFestival(today){
  const now = today || new Date();
  for(const key in FESTIVALS){
    const f=FESTIVALS[key];
    const ds=f.dates[now.getFullYear()] || f.dates[now.getFullYear()-1];
    if(!ds) continue;
    // check both this year's and (for Dec→Jan wrap) adjacent
    const cands=[f.dates[now.getFullYear()-1],f.dates[now.getFullYear()],f.dates[now.getFullYear()+1]].filter(Boolean);
    for(const d of cands){
      const date=new Date(d+'T00:00:00');
      const start=new Date(date); start.setDate(start.getDate()-FEST_BEFORE); start.setHours(0,0,0,0);
      const end=new Date(date); end.setDate(end.getDate()+FEST_AFTER); end.setHours(23,59,59,999);
      if(now>=start && now<=end) return Object.assign({key}, f);
    }
  }
  return null;
}

  lotus:['🪷','✨','🟡'], flag:['🇲🇾','⭐','✨'], snow:['❄️','❅','✦'] };
// build the persistent decoration layer (falling pieces across the screen)
function renderFestLayer(){
  document.querySelectorAll('.fest-layer').forEach(e=>e.remove());
  if(!CURRENT_FEST) return;
  const glyphs=FEST_GLYPH[CURRENT_FEST.deco]||['✨'];
  const layer=document.createElement('div'); layer.className='fest-layer';
  const N=22; // visible count across screen
  let html='';
  for(let i=0;i<N;i++){
    const g=glyphs[i%glyphs.length];
    const left=Math.random()*100;
    const dur=6+Math.random()*7;       // 6–13s fall
    const delay=-Math.random()*dur;     // stagger (negative = already mid-fall)
    const size=16+Math.random()*16;
    const drift=(Math.random()*80-40)+'px';
    const spin=(Math.random()*720-360)+'deg';
    html+=`<div class="fest-piece" style="left:${left}vw;font-size:${size}px;animation-duration:${dur}s;animation-delay:${delay}s;--drift:${drift};--spin:${spin}">${g}</div>`;
  }
  layer.innerHTML=html;
  document.body.appendChild(layer);
}
// short built-in chime per festival (WebAudio, no file). Plays after a user tap (login).
function playFestChime(fest){
  try{
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    const ctx=new AC();
    // simple cheerful arpeggio; tone set varies a touch by festival
    const sets={ christmas:[523,659,784,1047], cny:[587,740,880,1175], default:[523,659,784,988] };
    const notes=sets[fest.key]||sets.default;
    let t=ctx.currentTime;
    notes.forEach((f,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='triangle'; o.frequency.value=f;
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.18,t+0.03);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.45);
      o.start(t); o.stop(t+0.5); t+=0.18;
    });
    setTimeout(()=>{ try{ctx.close();}catch(e){} }, 3000);
  }catch(e){}
}

async function fetchSlides(){
  if(!IS_LIVE) return; // skip if not configured yet
  try{
    const r = await fetch(
      `${SUPA_URL}/rest/v1/gl_onboarding_slides?select=*&active=eq.true&order=sort_order.asc`,
      { headers:{ apikey:SUPA_ANON, Authorization:`Bearer ${SUPA_ANON}` } }
    );
    if(r.ok){
      const rows = await r.json();
      if(Array.isArray(rows) && rows.length){
        SLIDES = rows.map(x=>({
          eyebrow:x.eyebrow||"", title:x.title||"", glyph:x.glyph||"✨",
          image:x.image_url||null, video:x.video_url||null,
          bgImage:x.bg_image_url||null, bgVideo:x.bg_video_url||null, bgDim:x.bg_dim??55
        }));
      }
    }
  }catch(e){ /* fall back silently */ }
  // load global style settings
  try{
    const r2 = await fetch(
      `${SUPA_URL}/rest/v1/gl_settings?select=data&id=eq.style`,
      { headers:{ apikey:SUPA_ANON, Authorization:`Bearer ${SUPA_ANON}` } }
    );
    if(r2.ok){ const rows=await r2.json(); if(rows[0]&&rows[0].data) STYLE=Object.assign({},STYLE_DEFAULTS,rows[0].data); }
  }catch(e){}
  // mystery box + warranty settings
  try{
    const r3=await fetch(`${SUPA_URL}/rest/v1/gl_settings?select=id,data&id=in.(mysterybox,warranty,highlights,actionbtn,popup,referral,brandinfo,wallet,reviews,social,booking)`,
      { headers:{ apikey:SUPA_ANON, Authorization:`Bearer ${SUPA_ANON}` } });
    if(r3.ok){ const rows=await r3.json();
      rows.forEach(row=>{
        if(row.id==='mysterybox') MYSTERY=Object.assign({},MYSTERY,row.data||{});
        if(row.id==='warranty'){ if(row.data?.url) STYLE.warrantyUrl=row.data.url; if(row.data?.img) STYLE.warrantyImg=row.data.img; }
        if(row.id==='highlights') HIGHLIGHTS=Object.assign({},HIGHLIGHTS,row.data||{});
        if(row.id==='reviews') REVIEWS=Object.assign({},REVIEWS,row.data||{});
        if(row.id==='social') SOCIAL=Object.assign({},SOCIAL,row.data||{});
        if(row.id==='booking') BOOKING_CFG=Object.assign({},BOOKING_CFG,row.data||{});
        if(row.id==='actionbtn') ACTIONBTN=Object.assign({},ACTIONBTN,row.data||{});
        if(row.id==='popup') POPUP=Object.assign({},POPUP,row.data||{});
        if(row.id==='referral') REFERRAL=Object.assign({},REFERRAL,row.data||{});
        if(row.id==='brandinfo') BRAND_INFO=Object.assign({},row.data||{});
        if(row.id==='wallet') WALLET_CFG=Object.assign({},WALLET_CFG,row.data||{});
      });
    }
  }catch(e){}
  applyStyle();
}

const OTP_CHANNEL = "sms";  // "whatsapp" or "sms"
async function sendOtp(phone){
  // Supabase phone auth — sends OTP via the configured channel
  const body = { phone };
  if(OTP_CHANNEL==="whatsapp") body.channel = "whatsapp";
  const r = await fetch(`${SUPA_URL}/auth/v1/otp`,{
    method:"POST",
    headers:{ "Content-Type":"application/json", apikey:SUPA_ANON },
    body:JSON.stringify(body)
  });
  return r.ok;
}
async function verifyOtp(phone, token){
  const r = await fetch(`${SUPA_URL}/auth/v1/verify`,{
    method:"POST",
    headers:{ "Content-Type":"application/json", apikey:SUPA_ANON },
    body:JSON.stringify({ phone, token, type:(OTP_CHANNEL==="whatsapp"?"whatsapp":"sms") })
  });
  if(!r.ok) return null;
  return r.json(); // { access_token, refresh_token, user, ... }
}

/* ---------- Code128-B barcode (self-contained SVG, no library) ---------- */
const _C128B=["212222","222122","222221","121223","121322","131222","122213","122312","132212","221213","221312","231212","112232","122132","122231","113222","123122","123221","223211","221132","221231","213212","223112","312131","311222","321122","321221","312212","322112","322211","212123","212321","232121","111323","131123","131321","112313","132113","132311","211313","231113","231311","112133","112331","132131","113123","113321","133121","313121","211331","231131","213113","213311","213131","311123","311321","331121","312113","312311","332111","314111","221411","431111","111224","111422","121124","121421","141122","141221","112214","112412","122114","122411","142112","142211","241211","221114","413111","241112","134111","111242","121142","121241","114212","124112","124211","411212","421112","421211","212141","214121","412121","111143","111341","131141","114113","114311","411113","411311","113141","114131","311141","411131","211412","211214","211232","2331112"];
function code128B(text){
  // returns array of bar widths. Start B = 104, checksum, Stop = 106 (pattern incl term bar)
  let codes=[104]; let sum=104;
  for(let i=0;i<text.length;i++){ const v=text.charCodeAt(i)-32; codes.push(v); sum+=v*(i+1); }
  codes.push(sum%103);
  codes.push(106);
  let widths=[];
  codes.forEach(c=>{ const pat=_C128B[c]; for(const ch of pat) widths.push(parseInt(ch,10)); });
  return widths;
}
function barcodeSvg(text, opts){
  opts=opts||{}; const h=opts.height||64; const unit=opts.unit||2;
  const widths=code128B(text);
  let x=0, rects='';
  widths.forEach((w,i)=>{ const ww=w*unit; if(i%2===0){ rects+=`<rect x="${x}" y="0" width="${ww}" height="${h}" fill="#000"/>`; } x+=ww; });
  return `<svg class="barcode" viewBox="0 0 ${x} ${h}" width="100%" height="${h}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="background:#fff">${rects}</svg>`;
}

/* ---------- Daily check-in ---------- */
let CHECKIN={streak:0,last_checkin:null};
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
async function fetchCheckin(){
  if(!SESSION?.user?.id){ CHECKIN={streak:0,last_checkin:null}; return CHECKIN; }
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/gl_checkins?select=*&owner_id=eq.${SESSION.user.id}`,{headers:authHeaders()});
    if(r.ok){ const rows=await r.json(); if(rows[0]) CHECKIN={streak:rows[0].streak||0,last_checkin:rows[0].last_checkin}; }
  }catch(e){}
  // if they missed a day (gap > 1), streak is stale → will reset on next check-in
  return CHECKIN;
}
// returns the effective current streak accounting for missed days
function effectiveStreak(){
  if(!CHECKIN.last_checkin) return 0;
  const gap=daysBetween(CHECKIN.last_checkin, todayStr());
  if(gap===0) return CHECKIN.streak;       // already counted today
  if(gap===1) return CHECKIN.streak;       // consecutive, ready for next
  return 0;                                 // missed a day → reset
}
function checkedInToday(){ return CHECKIN.last_checkin===todayStr(); }
async function doCheckin(){
  if(!SESSION?.user?.id){ toast('Sign in to check in'); return; }
  if(checkedInToday()){ toast('Already checked in today ✓'); return; }
  const gap = CHECKIN.last_checkin ? daysBetween(CHECKIN.last_checkin, todayStr()) : 999;
  let newStreak = (gap===1 ? (CHECKIN.streak||0) : 0) + 1;  // consecutive +1, else reset to 1
  if(newStreak>7) newStreak=1;  // after completing 7, loop back
  const reached7 = newStreak===7;
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/gl_checkins`,{method:"POST",
      headers:Object.assign(authHeaders(),{Prefer:"resolution=merge-duplicates,return=representation"}),
      body:JSON.stringify({owner_id:SESSION.user.id,streak:newStreak,last_checkin:todayStr(),updated_at:new Date().toISOString()})});
    if(r.ok){
      CHECKIN={streak:newStreak,last_checkin:todayStr()};
      if(reached7) toast('🎁 Day 7! Claim your mystery gift at the counter.');
      else { const d=STYLE.checkinDays?.[newStreak-1]; const lbl=d?(d.type==='point'?d.value+' Point':d.type==='credit'?'RM'+d.value:d.type==='hook'?(d.service||d.value||'reward'):'reward'):'reward'; toast('Checked in ✓ +'+lbl); }
      renderHome();
    } else toast('Check-in failed');
  }catch(e){ toast('Check-in error'); }
}

function buildRail(){
  railEl.innerHTML="";
  for(let i=0;i<totalSteps;i++){
    const seg=document.createElement('div'); seg.className="seg";
    seg.innerHTML="<i></i>"; railEl.appendChild(seg);
  }
  updateRail();
}
function updateRail(){
  [...railEl.children].forEach((seg,i)=>{
    seg.classList.toggle('done', i<stepIndex);
    seg.classList.toggle('active', i===stepIndex);
  });
}

  screensEl.innerHTML="";

      goTo(stepIndex+1, true); return;
    }
    btn.disabled=true; btn.innerHTML='<div class="spinner"></div>';
    const ok=await sendOtp(authPhone);
    btn.disabled=false; btn.textContent="Next";
    if(ok){ goTo(stepIndex+1, true); }
    else { helper.classList.add('err'); helper.textContent="Couldn't send the code. Check the number and try again."; }
  };
  el.querySelector('[data-act="back"]').onclick=()=>goTo(SLIDES.length); // back to welcome
  return el;
}

function otpScreen(){
  const el=document.createElement('div'); el.className="screen auth otp-"+(STYLE.otpLayout||'top'); el.dataset.kind="otp";
  let bg="";
  if(STYLE.otpBgVideo){
    bg=`<div class="ob-bg"><video src="${STYLE.otpBgVideo}" autoplay muted loop playsinline></video><div class="ob-bg-dim" style="background:rgba(0,0,0,${(STYLE.otpBgDim??55)/100})"></div></div>`;
  } else if(STYLE.otpBgImage){
    bg=`<div class="ob-bg"><img src="${STYLE.otpBgImage}"><div class="ob-bg-dim" style="background:rgba(0,0,0,${(STYLE.otpBgDim??55)/100})"></div></div>`;
  }
  const tStyle=`font-size:${STYLE.otpTitleSize||30}px;color:${STYLE.otpTitleColor||'#fff'};font-weight:${STYLE.otpTitleBold?800:400};font-style:${STYLE.otpTitleItalic?'italic':'normal'};text-align:${STYLE.otpTitleAlign||'left'}`;
  const sStyle=`font-size:${STYLE.otpSubSize||15}px;color:${STYLE.otpSubColor||'#8A8A8A'}`;
  el.innerHTML=`
    ${bg}
    <div class="auth-h" style="${tStyle}">${STYLE.otpTitle||'Enter the code'}</div>
    <div class="auth-sub" style="${sStyle}">${STYLE.otpSub||'We sent a 6-digit code to'} <b id="otpPhone"></b>.</div>
    <div class="otp-row" id="otpRow"></div>
    <input class="otp-hidden" id="otpInput" type="tel" inputmode="numeric" maxlength="6" autocomplete="one-time-code" />
    <div class="helper err" id="otpHelper"></div>
    <div class="resend" id="resend">${STYLE.otpResend||"Didn't get it?"} <b>Resend in <span id="cd">30</span>s</b></div>
    <div class="auth-foot">
      <button class="btn btn-primary" id="verifyBtn" disabled>${STYLE.otpVerifyBtn||'Verify'}</button>
      <div class="link-row" data-act="changenum">${STYLE.otpChangeText||'Wrong number?'} <span>Change it</span></div>
    </div>`;
  const row=el.querySelector('#otpRow');
  const hidden=el.querySelector('#otpInput');
  const cells=[];
  for(let i=0;i<6;i++){const c=document.createElement('div');c.className="otp-cell";row.appendChild(c);cells.push(c);}
  const paint=()=>{
    const v=hidden.value;
    cells.forEach((c,i)=>{
      c.textContent=v[i]||"";
      c.classList.toggle('filled',!!v[i]);
      c.classList.toggle('cursor', i===v.length);
    });
    el.querySelector('#verifyBtn').disabled = v.length!==6;
  };
  row.onclick=()=>hidden.focus();
  hidden.addEventListener('input',()=>{hidden.value=hidden.value.replace(/[^\d]/g,'').slice(0,6);paint();el.querySelector('#otpHelper').textContent="";});
  el.querySelector('#verifyBtn').onclick=async ()=>{
    const btn=el.querySelector('#verifyBtn'); const helper=el.querySelector('#otpHelper');
    if(!IS_LIVE){
      toast("Demo verified ✓  (wire Supabase to go live)"); return;
    }
    btn.disabled=true; btn.innerHTML='<div class="spinner"></div>';
    const res=await verifyOtp(authPhone, hidden.value);
    if(res && res.access_token){
      localStorage.setItem('gl_session', JSON.stringify(res));
      SESSION=res;
      await fetchProfile();
      toast("You're in ✓");
      // returning user (has name) → Home; new user → referral, then profile
      if(PROFILE && PROFILE.name){ enterApp('home'); }
      else { openReferral(); }
    }else{
      btn.disabled=false; btn.textContent="Verify";
      helper.textContent="That code didn't match. Try again or resend.";
    }
  };
  el.querySelector('[data-act="changenum"]').onclick=()=>goTo(stepIndex-1, true);
  el._onShow=()=>{
    el.querySelector('#otpPhone').textContent=authPhone;
    hidden.value=""; paint(); setTimeout(()=>hidden.focus(),350);
    startCountdown(el);
  };
  return el;
}

function startCountdown(el){
  let n=30; const cd=el.querySelector('#cd'); const resend=el.querySelector('#resend');
  clearInterval(el._cdT);
  el._cdT=setInterval(()=>{
    n--; if(cd) cd.textContent=n;
    if(n<=0){
      clearInterval(el._cdT);
      resend.innerHTML='Didn\'t get it? <b id="rsBtn">Resend code</b>';
      resend.querySelector('#rsBtn').onclick=async()=>{
        if(IS_LIVE) await sendOtp(authPhone);
        toast("Code resent"); startCountdown(el);
      };
    }
  },1000);
}

function priceLabel(s){
  // variations take priority — show "from RM<lowest>"
  if(s.variations && Array.isArray(s.variations) && s.variations.length){
    const vals=s.variations.map(v=>Number(v.price)).filter(v=>!isNaN(v)&&v>0);
    if(vals.length) return (s.variations.length>1?'from RM':'RM')+Math.min(...vals);
  }
  if(s.price_by_type){
    const vals=Object.values(s.price_by_type).filter(v=>v!=null&&v!=='');
    if(vals.length) return 'from RM'+Math.min(...vals.map(Number));
    return '—';
  }
  return s.base_price?('RM'+s.base_price):'—';
}

function serviceEmoji(name){
  const n=(name||'').toLowerCase();
  if(n.includes('wash')||n.includes('clean'))return '🚿';
  if(n.includes('coat'))return '🛡️';
  if(n.includes('tint'))return '🪟';
