<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrandLab Job Board</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Syne:wght@700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;background:#fff;color:#111;font-family:'Outfit',system-ui,sans-serif}
@keyframes readyBlink{0%,100%{background:#FFFDF0;box-shadow:inset 0 0 0 4px #FACC15}50%{background:#FEF9C3;box-shadow:inset 0 0 0 4px #16A34A}}
.ready-row{animation:readyBlink 1.1s ease-in-out infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.promo-card{animation:fadeIn .6s ease}
.wrap{height:100vh;width:100vw;display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:1.4vh 2vw;border-bottom:3px solid #FACC15;flex-shrink:0}
.logo-box{display:inline-flex;background:#0A0A0B;border-radius:10px;padding:8px 14px;align-items:center}
.logo-box img{height:40px;display:block}
.sub{font-size:1.1vh;letter-spacing:.3em;color:#9CA3AF;text-transform:uppercase;margin-top:6px}
.clock{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:2.4vh;letter-spacing:.05em}
.body{flex:1;display:flex;overflow:hidden}
.board{flex:0 0 80%;display:flex;flex-direction:column;overflow:hidden;border-right:2px solid #FACC15}
.headRow,.row{display:grid;grid-template-columns:1.2fr 1.2fr 1fr 1.3fr 1fr .9fr;gap:10px}
.headRow{font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid #FACC15;padding:10px 16px;font-size:13px;flex-shrink:0}
.scaleWrap{flex:1;overflow:hidden;position:relative}
.scaleInner{position:absolute;top:0;left:0;transform-origin:top left;padding:10px 16px;display:flex;flex-direction:column;gap:10px}
.row{align-items:center;text-transform:uppercase;overflow:hidden;border-radius:12px;padding:0 16px;background:#fff;border:2px solid #EAEAEA}
.row.vip{border-color:#E11D63}
.cust-name{font-weight:700;font-size:16px;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:5px;white-space:nowrap}
.model{font-size:13px;color:#374151;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plate{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#111;background:#FACC15;display:inline-block;border-radius:6px;letter-spacing:.05em;padding:2px 9px;margin-top:4px}
.svc{font-size:13px;color:#374151;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status{display:inline-flex;align-items:flex-start;gap:6px;font-weight:700;font-size:13px;line-height:1.15}
.status .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
.elapsed{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden}
.side{flex:0 0 20%;display:flex;flex-direction:column;overflow:hidden;background:#0A0A0B}
.vid{flex:0 0 45%;min-height:0;background:#000;position:relative;overflow:hidden}
.vid video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;pointer-events:none}
.promoWrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:3vh 2vw;color:#fff}
.promo-tag{display:inline-block;background:#FACC15;color:#111;font-weight:800;font-size:1.4vh;letter-spacing:.05em;text-transform:uppercase;padding:4px 12px;border-radius:6px;margin-bottom:2vh;align-self:flex-start}
.promo-body{font-family:'Syne',sans-serif;font-weight:700;font-size:3vh;line-height:1.35}
.dots{display:flex;gap:7px;margin-top:3vh}
.dots span{width:9px;height:9px;border-radius:50%;background:#3F3F46}
.dots span.on{background:#FACC15}
.slogan{margin-top:auto;padding-top:3vh;font-family:'Syne',sans-serif;font-weight:700;font-size:1.7vh;color:#9CA3AF}
.sound-btn{display:flex;align-items:center;gap:6px;border-radius:8px;padding:.6vh 1vw;font-size:1.4vh;font-weight:700;cursor:pointer;font-family:inherit;border:none}
.more{position:absolute;bottom:0;left:0;right:0;text-align:center;padding:6px;font-size:1.5vh;font-weight:700;color:#9CA3AF;background:linear-gradient(transparent,#fff 40%)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr" id="hdr">
    <div>
      <div class="logo-box"><img src="logo.png" alt="GrandLab" onerror="this.style.display='none';this.parentElement.innerHTML='<span style=\'color:#FACC15;font-weight:900;font-size:24px;font-style:italic\'>grandlab</span>'"></div>
      <div class="sub">Live Job Board</div>
    </div>
    <div style="display:flex;align-items:center;gap:1.5vw">
      <button id="soundBtn" class="sound-btn" style="background:#E11D63;color:#fff" onclick="toggleSound()">🔇 Tap to Enable Sound</button>
      <div class="clock" id="clock">--:--:-- --</div>
    </div>
  </div>

  <div class="body">
    <div class="board">
      <div class="headRow">
        <div>Customer</div><div>Car / Plate</div><div>Service</div><div>Status</div><div>Elapsed</div><div>Staff</div>
      </div>
      <div class="scaleWrap" id="scaleWrap">
        <div class="scaleInner" id="rows"></div>
        <div class="more" id="moreNote" style="display:none"></div>
      </div>
    </div>

    <div class="side">
      <div class="vid">
        <video id="promoVid" autoplay muted playsinline controlslist="nodownload nofullscreen noremoteplayback" disablepictureinpicture></video>
      </div>
      <div class="promoWrap">
        <div class="promo-card" id="promoCard">
          <div class="promo-tag" id="promoTag">Grand Signature Wash</div>
          <div class="promo-body" id="promoBody">Our flagship hand wash with pH-neutral foam, wheel detail, and spotless glass finish.</div>
        </div>
        <div class="dots" id="promoDots"></div>
        <div class="slogan">Welcome to GrandLab Detailing Signature, Your Personalize Detailer.</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://eychljpzorzmaveixlnu.supabase.co";
const SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5Y2hsanB6b3J6bWF2ZWl4bG51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDk2NjQsImV4cCI6MjA5NzIyNTY2NH0.6dA1zhz5ZIwf8byFB8vhfOzPI-uPPdPihEr1b8GG_oA";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);

const STAGES=[
  {key:"upcoming",label:"Upcoming Reservation",short:"Upcoming",color:"#9CA3AF"},
  {key:"carwash",label:"Car Wash",short:"Car Wash",color:"#2563EB"},
  {key:"vacuum",label:"Vacuum",short:"Vacuum",color:"#0891B2"},
  {key:"polish",label:"Polish In Progress",short:"Polish",color:"#7C3AED"},
  {key:"coating",label:"Coating In Progress",short:"Coating",color:"#9333EA"},
  {key:"interior",label:"Interior Washing",short:"Interior",color:"#0D9488"},
  {key:"wrapping",label:"Wrapping In Progress",short:"Wrapping",color:"#DB2777"},
  {key:"ppf",label:"PPF In Progress",short:"PPF",color:"#C026D3"},
  {key:"tinting",label:"Tinting In Progress",short:"Tinting",color:"#4F46E5"},
  {key:"finaltouch",label:"Final Checking",short:"Final Check",color:"#D97706"},
  {key:"done",label:"Ready",short:"Ready",color:"#16A34A"},
];
const stageOf=k=>STAGES.find(s=>s.key===k)||STAGES[0];
const DONE_KEY="done";

const PROMO_CARDS=[
  {title:"Grand Signature Wash",body:"Our flagship hand wash with pH-neutral foam, wheel detail, and spotless glass finish."},
  {title:"Ceramic Coating",body:"Long-lasting paint protection with deep gloss and hydrophobic shine — up to 5 years."},
  {title:"Paint Protection Film (PPF)",body:"Invisible shield against stone chips, scratches, and road debris."},
  {title:"Car Care Tip",body:"Wash your car in the shade — direct sun dries soap too fast and leaves water spots."},
  {title:"Car Care Tip",body:"Dry with a clean microfibre towel, not the sun — air-drying causes mineral spotting."},
  {title:"Interior Detailing",body:"Deep vacuum, leather conditioning, and antibacterial cabin treatment."},
];
const VIDEO_PLAYLIST=["promo1.mp4","promo2.mp4","promo3.mp4","promo4.mp4","promo5.mp4","promo6.mp4","promo7.mp4","promo8.mp4","promo9.mp4","promo10.mp4","promo11.mp4"];

let JOBS=[], NOW=Date.now(), soundOn=false, promoIdx=0, vidIdx=0;
const knownReady=new Set(); let firstLoad=true;
const $=id=>document.getElementById(id);

/* ---------- elapsed + sort (from shared.js) ---------- */
function elapsedStr(fromTs){
  if(!fromTs)return"-";
  const s=Math.floor((NOW-fromTs)/1000);
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return h>0?`${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`:`${m}:${String(sec).padStart(2,"0")}`;
}
function sortJobs(jobs){
  const firstKey="upcoming",doneKey="done",finalKey="finaltouch";
  const group=j=>j.stage===firstKey?0:(j.stage===doneKey?1:(j.stage===finalKey?2:3));
  return [...jobs].sort((a,b)=>{
    const ga=group(a),gb=group(b);
    if(ga!==gb)return ga-gb;
    if(ga===0)return (a.appt||"").localeCompare(b.appt||"");
    return (a.started_at||a.created_at||0)-(b.started_at||b.created_at||0);
  });
}

/* map a gl_jobs row to board fields */
function svcText(j){ const s=(j.services||[]); return s.length?(s[0].desc||""):""; }
function custName(j){ return j.name||j.workshop_name||"-"; }
function techList(j){ return Array.isArray(j.techs)&&j.techs.length?j.techs:(j.staff?j.staff.split(',').map(s=>s.trim()).filter(Boolean):[]); }

/* ---------- load + realtime ---------- */
async function load(){
  const {data}=await sb.from('gl_jobs').select('*').neq('status','paid');
  const incoming=data||[];
  // announce newly-ready cars
  if(soundOn && !firstLoad){
    incoming.forEach(j=>{ if(j.stage===DONE_KEY && !knownReady.has(j.id)) announce(j.plate); });
  }
  knownReady.clear();
  incoming.forEach(j=>{ if(j.stage===DONE_KEY) knownReady.add(j.id); });
  firstLoad=false;
  JOBS=incoming; render();
}
function subscribe(){
  sb.channel('board-rt').on('postgres_changes',{event:'*',schema:'public',table:'gl_jobs'},()=>load()).subscribe();
}

/* ---------- render board ---------- */
const ROW_H=68;
function render(){
  const sorted=sortJobs(JOBS);
  const rows=$('rows');
  // fit scaling
  const vh=window.innerHeight;
  const headH=$('hdr').offsetHeight;
  const avail=vh-headH-24-44; // minus header + board head row
  let visibleCount=sorted.length||1;
  let scale=avail/((sorted.length||1)*ROW_H);
  scale=Math.min(1.2,scale);
  const MIN=0.42;
  if(scale<MIN){ scale=MIN; visibleCount=Math.max(Math.floor(avail/(ROW_H*scale)),1); }
  const shown=sorted.slice(0,visibleCount);
  const hidden=sorted.length-shown.length;

  rows.style.transform=`scale(${scale})`;
  rows.style.width=(100/scale)+'%';

  if(!sorted.length){
    rows.innerHTML='<div style="text-align:center;color:#9CA3AF;padding:50px;font-size:22px">No cars on the board.</div>';
  }else{
    rows.innerHTML=shown.map(j=>{
      const st=stageOf(j.stage);
      const ready=j.stage===DONE_KEY;
      const waiting=!j.started_at;
      const vip=/vip|platinum/i.test(j.tier||'');
      const techs=techList(j);
      return `<div class="row ${ready?'ready-row':''} ${vip?'vip':''}" style="height:${ROW_H-10}px">
        <div style="min-width:0;overflow:hidden">
          <div class="cust-name">${vip?'👑 ':''}<span style="overflow:hidden;text-overflow:ellipsis">${esc(custName(j))}</span></div>
          <div style="display:flex;gap:4px;margin-top:3px">
            ${vip?'<span class="badge" style="background:#FCE7F0;color:#E11D63">VIP</span>':'<span class="badge" style="background:#F3F4F6;color:#6B7280">STANDARD</span>'}
            ${j.is_new?'<span class="badge" style="background:#DBEAFE;color:#2563EB">NEW</span>':'<span class="badge" style="background:#DCFCE7;color:#16A34A">REGULAR</span>'}
          </div>
        </div>
        <div style="min-width:0;overflow:hidden">
          <div class="model">${esc(j.model||'-')}</div>
          <div class="plate">${esc(j.plate||'')}</div>
        </div>
        <div class="svc">${esc(svcText(j)||'-')}</div>
        <div style="min-width:0;overflow:hidden;padding-right:8px"><span class="status" style="color:${st.color}"><span class="dot" style="background:${st.color}"></span><span style="overflow-wrap:anywhere">${st.label}</span></span></div>
        <div class="elapsed" style="color:${ready?'#16A34A':waiting?'#D1D5DB':'#111'}">${waiting?'-':elapsedStr(j.started_at)}${ready&&j.ready_at?`<div style="font-size:11px;color:#16A34A;font-weight:600;margin-top:2px">✓ ${new Date(j.ready_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>`:''}</div>
        <div style="min-width:0;display:flex;flex-wrap:wrap;gap:4px;overflow:hidden">${techs.length?techs.map(t=>`<span class="badge" style="background:#F3F4F6;color:#374151">${esc(t)}</span>`).join(''):'<span style="color:#9CA3AF;font-size:12px">-</span>'}</div>
      </div>`;
    }).join('');
  }
  const mn=$('moreNote');
  if(hidden>0){ mn.style.display='block'; mn.textContent=`+ ${hidden} more car${hidden>1?'s':''} not shown`; }
  else mn.style.display='none';
}

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---------- clock ---------- */
function tickClock(){
  const d=new Date();
  let h=d.getHours(); const ap=h>=12?'pm':'am'; h=h%12||12;
  $('clock').textContent=`${String(h).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')} ${ap}`;
}

/* ---------- promo rotation ---------- */
function renderPromo(){
  const p=PROMO_CARDS[promoIdx];
  const card=$('promoCard');
  card.classList.remove('promo-card'); void card.offsetWidth; card.classList.add('promo-card');
  $('promoTag').textContent=p.title; $('promoBody').textContent=p.body;
  $('promoDots').innerHTML=PROMO_CARDS.map((_,i)=>`<span class="${i===promoIdx?'on':''}"></span>`).join('');
}

/* ---------- video playlist ---------- */
function initVideo(){
  const v=$('promoVid');
  function playCur(){ v.src=VIDEO_PLAYLIST[vidIdx]; v.play().catch(()=>{}); }
  v.onended=()=>{ vidIdx=(vidIdx+1)%VIDEO_PLAYLIST.length; playCur(); };
  v.onerror=()=>{ vidIdx=(vidIdx+1)%VIDEO_PLAYLIST.length; playCur(); };
  playCur();
}

/* ---------- sound announce (audio clips, like the React board) ---------- */
let player=null;
function playFile(src){
  return new Promise(res=>{
    try{ if(!player)player=new Audio(); const a=player; a.src=src; a.currentTime=0;
      let done=false; const fin=()=>{if(!done){done=true;res();}};
      a.onended=fin; a.onerror=fin; const p=a.play(); if(p&&p.catch)p.catch(fin);
      setTimeout(fin,6000);
    }catch(e){res();}
  });
}
async function playPlate(plate,lang){
  const chars=(plate||'').toUpperCase().replace(/[^A-Z0-9]/g,'').split('');
  for(const ch of chars){
    if(ch>='0'&&ch<='9'){ await playFile(lang?`audio/${lang}-${ch}.mp3`:`audio/${ch}.mp3`); }
    else await playFile(`audio/${ch.toLowerCase()}.mp3`);
  }
}
async function announce(plate){
  await playFile('chime.mp3'); await wait(150);
  await playPlate(plate,''); await wait(120); await playFile('audio/msg-en.mp3'); await wait(250);
  await playPlate(plate,'ms'); await wait(120); await playFile('audio/msg-ms.mp3'); await wait(250);
  await playPlate(plate,'zh'); await wait(120); await playFile('audio/msg-zh.mp3');
}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}
function toggleSound(){
  if(!soundOn){
    soundOn=true;
    $('soundBtn').style.background='#fff'; $('soundBtn').style.border='2px solid #16A34A'; $('soundBtn').style.color='#16A34A';
    $('soundBtn').innerHTML='🔊 Sound On'; $('soundBtn').onclick=()=>announce('BQM6833'); // tap again = test
    try{ if(!player)player=new Audio(); player.src='chime.mp3'; player.play().then(()=>{player.pause();player.currentTime=0;}).catch(()=>{}); }catch(e){}
  }
}

/* ---------- boot ---------- */
tickClock(); setInterval(tickClock,1000);
setInterval(()=>{ NOW=Date.now(); render(); },1000);
setInterval(()=>{ promoIdx=(promoIdx+1)%PROMO_CARDS.length; renderPromo(); },8000);
renderPromo(); initVideo();
load(); subscribe();
window.addEventListener('resize',render);
</script>
</body>
</html>
