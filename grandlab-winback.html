<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<title>Grandlab Win-Back</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#080808;--card:#141414;--card2:#1c1c1c;--gold:#F5C518;--text:#fff;--text2:#9a9a9a;--border:#2a2a2a;--green:#16A34A;--wa:#25D366}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text)}
.app{max-width:620px;margin:0 auto;min-height:100dvh;padding:54px 14px 60px}
.back{position:fixed;top:8px;left:8px;z-index:300;background:rgba(0,0,0,.65);color:var(--gold);text-decoration:none;font-size:12px;font-weight:700;padding:6px 11px;border-radius:20px;backdrop-filter:blur(4px)}
.hdr{text-align:center;margin-bottom:16px}
.logo{font-weight:900;font-size:24px;letter-spacing:1px}
.logo span{color:var(--gold)}
.tag{font-size:11px;color:var(--text2);letter-spacing:.2em;text-transform:uppercase;margin-top:4px}

.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:15px;margin-bottom:14px}
.panel h2{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:12px;font-weight:700}
.fld{margin-bottom:11px}
.fld label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600}
.fld input,.fld select,.fld textarea{width:100%;background:#1e1e1a;border:1px solid var(--border);border-radius:10px;color:#fff;padding:10px 12px;font-size:14px;font-family:inherit;outline:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold)}
.fld textarea{resize:vertical;min-height:84px;line-height:1.5}
.tiers{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.tiers .fld{margin-bottom:0}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hint{font-size:11px;color:var(--text2);margin-top:5px;line-height:1.45}
.tokenrow{font-size:11px;color:var(--text2);margin-top:6px}
.tok{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;margin:2px 3px 0 0;color:var(--gold);font-family:monospace;font-size:11px}

.btn{background:var(--gold);color:#080808;border:none;border-radius:11px;padding:12px;font-weight:800;font-size:14px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;width:100%}
.btn:active{transform:scale(.98)}
.btn.sec{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn.sm{width:auto;padding:9px 13px;font-size:13px}

/* cap + stats bar */
.bar{display:flex;gap:10px;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 15px;margin-bottom:14px}
.bar .stat{text-align:center}
.bar .num{font-size:20px;font-weight:900;color:var(--gold);line-height:1}
.bar .lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.cap-warn{color:#e0533d;font-weight:700}

/* customer list */
.cust{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:9px;transition:.15s}
.cust.done{opacity:.45}
.cust-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.cust-name{font-weight:800;font-size:15px}
.cust-meta{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
.seg{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em}
.seg.cool{background:rgba(245,197,24,.15);color:var(--gold)}
.seg.laps{background:rgba(224,83,61,.15);color:#e0533d}
.seg.dorm{background:rgba(154,154,154,.15);color:var(--text2)}
.cust-actions{display:flex;gap:8px;margin-top:11px}
.btn-wa{background:var(--wa);color:#062b16;border:none;border-radius:10px;padding:10px 14px;font-weight:800;font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;flex:1;text-decoration:none}
.btn-wa:active{transform:scale(.98)}
.btn-done{background:var(--card2);color:var(--text2);border:1px solid var(--border);border-radius:10px;padding:10px 13px;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer}
.btn-undo{background:none;color:var(--text2);border:1px solid var(--border);border-radius:10px;padding:10px 13px;font-weight:600;font-size:12px;font-family:inherit;cursor:pointer}
.tickdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:5px;vertical-align:middle}

.status{text-align:center;font-size:12px;color:var(--text2);margin:14px 0;min-height:16px}
.empty{text-align:center;padding:30px 18px;color:var(--text2)}
.empty .big{font-size:38px;margin-bottom:10px}
details summary{cursor:pointer;font-size:12px;color:var(--gold);font-weight:700;padding:4px 0}
details[open] summary{margin-bottom:10px}

/* mode switch */
.modeswitch{display:flex;gap:8px;margin-bottom:14px}
.ms-btn{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:12px;padding:11px;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.ms-btn.active{background:var(--gold);color:#080808;border-color:var(--gold)}
.ms-btn:active{transform:scale(.98)}

/* login gate */
.gate{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px}
.gate.hidden{display:none}
.gate-box{width:100%;max-width:340px}
.gate label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600}
.gate input{width:100%;background:#1e1e1a;border:1px solid var(--border);border-radius:12px;color:#fff;padding:13px 14px;font-size:15px;font-family:inherit;margin-bottom:12px;outline:none}
.gate input:focus{border-color:var(--gold)}
.gate button{width:100%;background:var(--gold);color:#080808;border:none;border-radius:12px;padding:14px;font-weight:800;font-size:15px;font-family:inherit;cursor:pointer}
.err{color:#e0533d;font-size:12px;min-height:16px;margin-bottom:6px}
</style>
</head>
<body>

<a class="back" href="https://grandpride.github.io/Grandlab-app/gl-hub.html">← Hub</a>

<div id="gate" class="gate">
  <div class="gate-box">
    <div class="logo" style="text-align:center;margin-bottom:6px">GRAND<span>LAB</span></div>
    <div class="tag" style="text-align:center;margin-bottom:24px">Win-Back</div>
    <label>Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="admin@grandpride.com">
    <label>Password</label>
    <input id="pass" type="password" autocomplete="current-password" placeholder="Password">
    <div class="err" id="loginErr"></div>
    <button onclick="doLogin()">Sign in</button>
  </div>
</div>

<div class="app">
  <div class="hdr">
    <div class="logo">GRAND<span>LAB</span></div>
    <div class="tag" id="modeTag">Win-Back Campaign</div>
  </div>

  <!-- Mode toggle -->
  <div class="modeswitch">
    <button class="ms-btn active" id="msWin" onclick="setMode('winback')"><i class="ti ti-discount-2"></i> Win-Back</button>
    <button class="ms-btn" id="msCoat" onclick="setMode('coating')"><i class="ti ti-shield-check"></i> Coating Reminder</button>
  </div>

  <!-- Setup panel -->
  <div class="panel">
    <h2><i class="ti ti-settings"></i> <span id="setupTitle">Offer &amp; message</span></h2>
    <div id="offerBlock">
    <div class="fld">
      <label>Promo code</label>
      <input id="code" placeholder="WELCOMEBACK" value="WELCOMEBACK">
    </div>
    <label style="display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600">Discount by segment (RM off)</label>
    <div class="tiers">
      <div class="fld"><label>Cooling 3-6mo</label><input id="dCool" type="number" inputmode="numeric" value="20"></div>
      <div class="fld"><label>Lapsed 6-12mo</label><input id="dLaps" type="number" inputmode="numeric" value="30"></div>
      <div class="fld"><label>Dormant 1-2yr</label><input id="dDorm" type="number" inputmode="numeric" value="50"></div>
    </div>
    </div>
    <div class="fld" style="margin-top:11px">
      <label>Message template</label>
      <textarea id="tmpl">Hi {name}! 👋 This is Grandlab Detailing. We noticed it's been a while since we last took care of your {model} 🚗 — we'd love to welcome you back!

Enjoy *RM{discount} OFF* your next visit. Just quote *{code}* when you book.

Reply here to reserve your slot 🙏</textarea>
      <div class="tokenrow" id="tokRow">Tags:
        <span class="tok">{name}</span><span class="tok">{model}</span><span class="tok">{plate}</span><span class="tok">{discount}</span><span class="tok">{code}</span>
      </div>
    </div>
  </div>

  <!-- Filter panel -->
  <div class="panel">
    <h2><i class="ti ti-filter"></i> Who to contact</h2>
    <div class="row2">
      <div class="fld">
        <label>Lapsed at least</label>
        <select id="minMonths">
          <option value="3">3 months</option>
          <option value="6" selected>6 months</option>
          <option value="12">12 months</option>
          <option value="18">18 months</option>
        </select>
      </div>
      <div class="fld">
        <label>Max age</label>
        <select id="maxMonths">
          <option value="12">12 months</option>
          <option value="24" selected>2 years</option>
          <option value="999">No limit</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="fld">
        <label>Min past visits</label>
        <select id="minVisits">
          <option value="1">1+ (everyone)</option>
          <option value="2" selected>2+ (repeat only)</option>
          <option value="3">3+ (loyal)</option>
          <option value="5">5+ (best)</option>
        </select>
      </div>
      <div class="fld">
        <label>Show</label>
        <select id="showFilter">
          <option value="todo" selected>Not yet contacted</option>
          <option value="all">All</option>
          <option value="done">Contacted</option>
        </select>
      </div>
    </div>
    <button class="btn" onclick="loadList()"><i class="ti ti-search"></i> Load list</button>
  </div>

  <!-- Daily cap bar -->
  <div class="bar" id="capBar" style="display:none">
    <div class="stat"><div class="num" id="sentToday">0</div><div class="lbl">Sent today</div></div>
    <div class="fld" style="margin:0;flex:1;max-width:120px">
      <label style="text-align:center">Daily cap</label>
      <input id="dailyCap" type="number" inputmode="numeric" value="35" style="text-align:center" onchange="renderCap()">
    </div>
    <div class="stat"><div class="num" id="remainCap">35</div><div class="lbl">Left today</div></div>
    <div class="stat"><div class="num" id="totalQueue">0</div><div class="lbl">In list</div></div>
  </div>

  <div class="status" id="status"></div>
  <div id="list"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="big">📋</div>
    <div id="emptyMsg">Set your offer above, then tap “Load list”.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://eychljpzorzmaveixlnu.supabase.co";
const SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5Y2hsanB6b3J6bWF2ZWl4bG51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDk2NjQsImV4cCI6MjA5NzIyNTY2NH0.6dA1zhz5ZIwf8byFB8vhfOzPI-uPPdPihEr1b8GG_oA";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON,{auth:{persistSession:true,autoRefreshToken:true,storageKey:'gl_auth'}});
const $=id=>document.getElementById(id);
let ROWS=[];
let MODE='winback';  // 'winback' | 'coating'
const TMPL_WINBACK=`Hi {name}! 👋 This is Grandlab Detailing. We noticed it's been a while since we last took care of your {model} 🚗 — we'd love to welcome you back!

Enjoy *RM{discount} OFF* your next visit. Just quote *{code}* when you book.

Reply here to reserve your slot 🙏`;
const TMPL_COATING=`Hi {name}! 🛡️ This is Grandlab Detailing. A friendly reminder that your {model} is due for its coating maintenance — keeping it on schedule protects your coating and keeps the shine.

You still have *{balance} maintenance visit(s)* remaining on your package. 🚗✨

Reply here and we'll arrange a slot for you 🙏`;

function setMode(m){
  MODE=m;
  $('msWin').classList.toggle('active', m==='winback');
  $('msCoat').classList.toggle('active', m==='coating');
  $('modeTag').textContent = m==='winback' ? 'Win-Back Campaign' : 'Coating Maintenance Reminder';
  $('setupTitle').textContent = m==='winback' ? 'Offer & message' : 'Reminder message';
  $('offerBlock').style.display = m==='winback' ? 'block' : 'none';
  // swap template + available tags
  $('tmpl').value = m==='winback' ? TMPL_WINBACK : TMPL_COATING;
  $('tokRow').innerHTML = m==='winback'
    ? 'Tags: <span class="tok">{name}</span><span class="tok">{model}</span><span class="tok">{plate}</span><span class="tok">{discount}</span><span class="tok">{code}</span>'
    : 'Tags: <span class="tok">{name}</span><span class="tok">{model}</span><span class="tok">{plate}</span><span class="tok">{balance}</span>';
  // coating mode forces min visits irrelevant; default min lapsed 3mo
  $('minVisits').parentElement.style.opacity = m==='coating' ? '.5' : '1';
  ROWS=[]; $('list').innerHTML=''; $('capBar').style.display='none';
  $('empty').style.display='block';
  $('emptyMsg').textContent = m==='coating'
    ? 'Coating customers with maintenance left, lapsed 3mo+. Tap “Load list”.'
    : 'Set your offer above, then tap “Load list”.';
}

/* ---------- login ---------- */
async function boot(){
  const {data}=await sb.auth.getSession();
  if(data&&data.session){ $('gate').classList.add('hidden'); }
  else $('gate').classList.remove('hidden');
}
async function doLogin(){
  const email=$('email').value.trim(), pass=$('pass').value;
  $('loginErr').textContent='Signing in…';
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){ $('loginErr').textContent='Login failed: '+error.message; return; }
  $('loginErr').textContent=''; $('gate').classList.add('hidden');
}

/* ---------- helpers ---------- */
const today=()=>new Date();
function monthsSince(dateStr){
  if(!dateStr) return 9999;
  const d=new Date(dateStr); if(isNaN(d)) return 9999;
  return (today()-d)/(1000*60*60*24*30.44);
}
function segOf(m){ if(m<6)return 'cool'; if(m<12)return 'laps'; return 'dorm'; }
function segLabel(s){ return s==='cool'?'Cooling':s==='laps'?'Lapsed':'Dormant'; }
function discountFor(s){
  const v=s==='cool'?$('dCool').value:s==='laps'?$('dLaps').value:$('dDorm').value;
  return parseInt(v||'0',10);
}
function titleCase(str){ return (str||'').toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()); }
function firstName(n){ n=(n||'').trim(); if(!n) return 'there'; return titleCase(n.split(/\s|\(/)[0]); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function todayKey(){ return new Date().toISOString().slice(0,10); }

// coating balance = pkg_total - pkg_used, only if pkg_name mentions coating
function coatingBalance(c){
  const nm=(c.pkg_name||'').toLowerCase();
  if(!nm.includes('coating')) return 0;
  const bal=(c.pkg_total||0)-(c.pkg_used||0);
  return bal>0?bal:0;
}

function buildMessage(c){
  const s=segOf(c._months);
  const disc=discountFor(s);
  let t=$('tmpl').value;
  t=t.replace(/{name}/g, firstName(c.name))
     .replace(/{model}/g, titleCase(c.model||'car'))
     .replace(/{plate}/g, c.plate||'')
     .replace(/{discount}/g, disc)
     .replace(/{balance}/g, coatingBalance(c))
     .replace(/{code}/g, $('code').value.trim()||'');
  return t;
}
function waLink(c){
  const phone=(c.phone||'').replace(/[^\d]/g,''); // wa.me wants digits only, no +
  return 'https://wa.me/'+phone+'?text='+encodeURIComponent(buildMessage(c));
}

/* ---------- load + filter ---------- */
const STAMP=()=> MODE==='coating' ? 'cm_reminded_at' : 'wb_contacted_at';
async function loadList(){
  $('status').textContent='Loading customers…';
  $('empty').style.display='none';
  const minM = MODE==='coating' ? 3 : parseFloat($('minMonths').value);
  const maxM = parseFloat($('maxMonths').value);
  const minV = MODE==='coating' ? 1 : parseInt($('minVisits').value,10);
  const stampCol=STAMP();

  // pull candidates: have phone + a last_service. Page through to be safe.
  let all=[], from=0, page=1000;
  while(true){
    const {data,error}=await sb.from('gl_walkin')
      .select('id,name,phone,plate,model,last_service,visit_count,pkg_name,pkg_total,pkg_used,wb_contacted_at,cm_reminded_at')
      .not('phone','is',null).not('last_service','is',null)
      .order('last_service',{ascending:false}).range(from,from+page-1);
    if(error){ $('status').textContent='Error: '+error.message; return; }
    all=all.concat(data||[]);
    if(!data||data.length<page) break;
    from+=page;
  }

  const showF=$('showFilter').value;
  const list=[];
  for(const r of all){
    const m=monthsSince(r.last_service);
    if(m<minM||m>maxM) continue;
    if(!r.phone) continue;
    if(MODE==='coating'){
      if(coatingBalance(r)<=0) continue;          // must have coating visits left
    }else{
      if((r.visit_count||1)<minV) continue;
    }
    const contacted=!!r[stampCol];
    if(showF==='todo'&&contacted) continue;
    if(showF==='done'&&!contacted) continue;
    r._months=m; r._seg=segOf(m); r._contacted=contacted;
    list.push(r);
  }
  if(MODE==='coating'){
    // priority: fewest months since last visit? No — longest lapsed with most balance first
    list.sort((a,b)=> coatingBalance(b)-coatingBalance(a) || b._months-a._months);
  }else{
    list.sort((a,b)=>(b.visit_count||0)-(a.visit_count||0) || b._months-a._months);
  }
  ROWS=list;
  render();
}

function render(){
  $('capBar').style.display = ROWS.length?'flex':'none';
  if(!ROWS.length){
    $('list').innerHTML='';
    $('empty').style.display='block';
    $('emptyMsg').textContent='No customers match these filters.';
    $('status').textContent='';
    renderCap(); return;
  }
  $('empty').style.display='none';
  $('status').textContent=ROWS.length+' customers loaded · highest priority first';
  $('list').innerHTML=ROWS.map((c,i)=>{
    const last=new Date(c.last_service).toLocaleDateString('en-GB',{month:'short',year:'numeric'});
    const mo=Math.round(c._months);
    let badge;
    if(MODE==='coating'){
      badge=`<span class="seg laps">${coatingBalance(c)} left</span>`;
    }else{
      badge=`<span class="seg ${c._seg}">${segLabel(c._seg)} · RM${discountFor(c._seg)}</span>`;
    }
    const metaLine = MODE==='coating'
      ? `Last visit ${last} · ${mo} mo ago · ${esc(titleCase((c.pkg_name||'').replace(/\(.*$/,'').trim()||'Coating'))}`
      : `Last visit ${last} · ${mo} mo ago · ${c.visit_count||1} visits`;
    return `<div class="cust ${c._contacted?'done':''}" id="c${i}">
      <div class="cust-top">
        <div>
          <div class="cust-name">${c._contacted?'<span class="tickdot"></span>':''}${esc(titleCase(c.name||'Customer'))}</div>
          <div class="cust-meta">${esc(titleCase(c.model||'—'))} · ${esc(c.plate||'—')}<br>
            ${metaLine}</div>
        </div>
        ${badge}
      </div>
      <div class="cust-actions">
        ${c._contacted
          ? `<button class="btn-undo" onclick="markUndo(${i})">↺ Mark not sent</button>`
          : `<a class="btn-wa" href="${waLink(c)}" target="_blank" rel="noopener" onclick="afterSend(${i})"><i class="ti ti-brand-whatsapp"></i> Send on WhatsApp</a>
             <button class="btn-done" onclick="markDone(${i})">✓</button>`}
      </div>
    </div>`;
  }).join('');
  renderCap();
}

function renderCap(){
  const cap=parseInt($('dailyCap').value||'0',10);
  const stampCol=STAMP();
  const sentToday=ROWS.filter(c=>c[stampCol] && String(c[stampCol]).slice(0,10)===todayKey()).length;
  $('sentToday').textContent=sentToday;
  $('totalQueue').textContent=ROWS.filter(c=>!c._contacted).length;
  const left=Math.max(0,cap-sentToday);
  const el=$('remainCap'); el.textContent=left;
  el.className='num'+(left<=0?' cap-warn':'');
}

/* ---------- contacted state ---------- */
async function setContacted(i, val){
  const c=ROWS[i];
  const stampCol=STAMP();
  const stamp=val?new Date().toISOString():null;
  const {error}=await sb.from('gl_walkin').update({[stampCol]:stamp}).eq('id',c.id);
  if(error){ $('status').textContent='Could not save status: '+error.message; return false; }
  c[stampCol]=stamp; c._contacted=val;
  return true;
}
async function afterSend(i){
  // fired when WhatsApp link tapped — auto-mark contacted
  await setContacted(i,true);
  setTimeout(()=>{ if($('showFilter').value==='todo'){ ROWS.splice(i,1); } render(); }, 400);
}
async function markDone(i){ if(await setContacted(i,true)){ if($('showFilter').value==='todo') ROWS.splice(i,1); render(); } }
async function markUndo(i){ if(await setContacted(i,false)){ render(); } }

['code','dCool','dLaps','dDorm','tmpl','dailyCap'].forEach(id=>{
  const el=$(id); if(el) el.addEventListener('input',()=>{ if(ROWS.length) render(); });
});
